              </div>
            ))}
          </div>
        </div>
        {incoming.length>0&&<div style={{background:T.amberL,borderRadius:14,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${T.amber}`}}>
          <p style={{margin:"0 0 4px",fontSize:13,fontWeight:800,color:T.amber}}>📥 {incoming.length} new order{incoming.length>1?"s":""} waiting</p>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[[t("tabProducts"),"📦",()=>setTab("products"),T.skyL,T.sky],[t("tabOrders"),"📋",()=>setTab("orders"),T.amberL,T.amber],[t("tabDelivery"),"🚚",()=>setTab("delivery"),T.greenXL,T.green],[lang==="sw"?"Tangaza":"Advertise","📣",()=>setTab("products"),T.redL,T.red]].map(([l,i,a,bg,c])=>(
            <button key={l} onClick={a} style={{background:bg,border:"none",borderRadius:16,padding:"16px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style={{fontSize:28,marginBottom:6}}>{i}</div><div style={{fontSize:12,fontWeight:600,color:T.text}}>{l}</div>
            </button>
          ))}
        </div>

          <Card key={p.id}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{fontSize:36,flexShrink:0,position:"relative"}}>{p.icon}{p.advert&&<span style={{position:"absolute",top:-4,right:-8,background:T.amber,color:"#fff",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:6}}>AD</span>}</div>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:800,color:T.text}}>{p.name}</p>
                <p style={{margin:"0 0 2px",fontSize:11,color:T.textL}}>{p.desc}</p>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:T.sky}}>TZS {fmt(p.price)} per {p.unitLabel}</p>
              </div>
              <Pill label={p.advert?t("advertised"):t("activeLabel")} color={p.advert?T.amber:T.sky} bg={p.advert?T.amberL:T.skyL}/>
            </div>
          </Card>
        ))}
      </div>}
      {tab==="orders"&&<OrdersList user={user} orders={orders} setOrders={setOrders} viewMode="seller"/>}
      {tab==="delivery"&&<DeliveryManagement user={user} orders={orders} setOrders={setOrders}/>}
      {tab==="needs"&&<NeedsBoard user={user} isMyNeeds={false}/>}
      {tab==="chat"&&<ChatList user={user}/>}
    </Shell>
  );

/* ══════════════════════════════════════════════════════════════
   DELIVERY MANAGEMENT
   Used by: Company (manage outbound), Delivery Agent (active jobs)
   Shows all orders with delivery=true, filtered by agent name if delivery role
══════════════════════════════════════════════════════════════ */
function DeliveryManagement({user, orders, setOrders}) {
  const {lang,t}=useLang();
  const isAgent = user.role === "delivery";
  // Agents see their own assigned deliveries; companies see all deliveries
  const deliveries = orders.filter(o => {
    if (!o.delivery) return false;
    if (!["pending","confirmed","processing","in_transit"].includes(o.status)) return false;
    if (isAgent) {
      // match by agent name or id
      return o.deliveryAgent?.name === user.name || o.deliveryAgent?.id === user.id;
    }
    return true; // company sees all
  });

  const update = (id, updates) => {
    const u = orders.map(o => o.id === id ? {...o, ...updates} : o);
    LS.set("kp_orders", u); setOrders(u);
  };

  const statusColor = s => ({pending:T.amber,confirmed:T.sky,processing:T.blue,in_transit:"#7c3aed",delivered:T.green,cancelled:T.red}[s]||T.textL);
  const statusBg = s => ({pending:T.amberL,confirmed:T.skyL,processing:T.blueL,in_transit:"#ede9fe",delivered:T.greenXL,cancelled:T.redL}[s]||"#f0f0f0");

  return (
    <div style={{padding:"14px 14px 80px"}}>
      <h2 style={{fontSize:16,fontWeight:700,color:T.text,margin:"0 0 4px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{isAgent?t("myDeliveries"):t("deliveryMgmt")}</h2>
      <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>
        {isAgent ? `${t("activeJobsTotal")} · ${deliveries.length} total` : `${t("allDeliveries")} · ${deliveries.length} active`}
      </p>

      {deliveries.length===0&&(
        <div style={{textAlign:"center",padding:"40px 0",background:T.card,borderRadius:8,boxShadow:"none",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:44,marginBottom:10}}>🚚</div>
          <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 4px"}}>
            {isAgent?t("noDeliveriesYet"):t("noActiveDeliveries")}
          </p>
          <p style={{fontSize:12,color:T.textL,margin:0}}>
            {isAgent?t("deliveriesAppear"):t("ordersDeliveryAppear")}
          </p>
        </div>
      )}

      {deliveries.map(o=>(
        <Card key={o.id} style={{borderLeft:`4px solid ${statusColor(o.status)}`}}>
          {/* Order header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800,color:T.text}}>{o.icon||"📦"} {o.productName}</p>
              <p style={{margin:"0 0 1px",fontSize:10,color:"#64748b",fontFamily:"monospace"}}>#{o.id} · {o.date} {o.time||""}</p>
              <p style={{margin:0,fontSize:12,fontWeight:700,color:T.green}}>TZS {fmt(o.total)}</p>
            </div>
            <span style={{background:statusBg(o.status),color:statusColor(o.status),fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:12,flexShrink:0}}>
              {o.status.replace("_"," ").toUpperCase()}
            </span>
          </div>

          {/* Route info */}
          <div style={{background:"#f9fafb",borderRadius:12,padding:"10px 12px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:3}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:T.green,flexShrink:0}}/>
                <div style={{width:2,height:20,background:"#d1d5db"}}/>
                <div style={{width:10,height:10,borderRadius:"50%",background:T.blue,flexShrink:0}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{marginBottom:8}}>
                  <p style={{margin:"0 0 1px",fontSize:11,fontWeight:700,color:T.green}}>{t("pickupLabel")}</p>
                  <p style={{margin:"0 0 1px",fontSize:12,fontWeight:600,color:T.text}}>{o.sellerName}</p>
                  <p style={{margin:0,fontSize:11,color:T.textL}}>{o.sellerArea}</p>
                  {o.sellerPhone&&<p style={{margin:"1px 0 0"}}><a href={`tel:${o.sellerPhone}`} style={{fontSize:11,color:T.sky,fontWeight:600,textDecoration:"none"}}>📞 {o.sellerPhone}</a></p>}
                </div>
                <div>
                  <p style={{margin:"0 0 1px",fontSize:11,fontWeight:700,color:T.blue}}>{t("deliverTo")}</p>
                  <p style={{margin:"0 0 1px",fontSize:12,fontWeight:600,color:T.text}}>{o.buyerName}</p>
                  <p style={{margin:0,fontSize:11,color:T.textL}}>{o.buyerArea}</p>
                  {o.buyerPhone&&<p style={{margin:"1px 0 0"}}><a href={`tel:${o.buyerPhone}`} style={{fontSize:11,color:T.sky,fontWeight:600,textDecoration:"none"}}>📞 {o.buyerPhone}</a></p>}
                </div>
              </div>
            </div>
          </div>

          {/* Agent & order info */}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textM,marginBottom:10,background:T.amberL,borderRadius:10,padding:"7px 10px"}}>
            <span>🏍️ {o.deliveryAgent?.name||"—"} · {o.deliveryAgent?.vehicle||"—"}</span>
            <span style={{fontWeight:700,color:T.amber}}>+TZS {fmt(o.deliveryAgent?.estimatedFee||0)}</span>
          </div>

          {/* Qty */}
          <p style={{fontSize:11,color:T.textM,margin:"0 0 10px",fontWeight:600}}>
            📦 {o.qty} {o.unitLabel}{(o.qty||1)>1?"s":""} · {o.paid?t("paidLabel"):t("unpaidLabel")}
          </p>

          {/* Progress bar for in_transit */}
          {o.status==="in_transit"&&(
            <div style={{background:"#e5e7eb",borderRadius:8,height:8,overflow:"hidden",marginBottom:10}}>
              <div style={{background:"linear-gradient(90deg,#7c3aed,#a78bfa)",width:"65%",height:"100%",borderRadius:8,animation:"kp-pulse 2s ease-in-out infinite"}}/>
              <style>{`@keyframes kp-pulse{0%,100%{opacity:1}50%{opacity:0.7}}`}</style>
            </div>
          )}

          {/* Action buttons */}
          {(o.status==="pending"||o.status==="confirmed")&&(
            <Btn onClick={()=>update(o.id,{status:"in_transit"})} small full color={T.amber}>{t("startDelivery")}</Btn>
          )}
          {o.status==="processing"&&(
            <Btn onClick={()=>update(o.id,{status:"in_transit"})} small full color={T.amber}>{t("markInTransit")}</Btn>
          )}
          {o.status==="in_transit"&&(
            <Btn onClick={()=>update(o.id,{status:"delivered"})} small full color={T.green}>{t("markAsDelivered")}</Btn>
          )}
        </Card>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PAYMENT SYSTEM
   Flow: Order placed → Payment modal → Choose method → Simulate
   → Payment confirmed → Order activated
   Breakdown: product total + delivery fee + 2% platform fee
══════════════════════════════════════════════════════════════ */

const PAYMENT_METHODS = [
  { id:"mpesa",   label:"M-Pesa",        icon:"📱", color:"#00a651", bg:"#e6f7ee", prompt:"Enter M-Pesa number", hint:"e.g. 0712 345 678" },
  { id:"tigo",    label:"Tigo Pesa",      icon:"💜", color:"#6b21a8", bg:"#f3e8ff", prompt:"Enter Tigo Pesa number", hint:"e.g. 0653 345 678" },
  { id:"airtel",  label:"Airtel Money",   icon:"❤️", color:"#dc2626", bg:"#fee2e2", prompt:"Enter Airtel number", hint:"e.g. 0683 345 678" },
  { id:"card",    label:"Debit/Credit Card", icon:"💳", color:"#1d4ed8", bg:"#dbeafe", prompt:"Enter card number", hint:"e.g. 4111 1111 1111 1111 (simulation)" },
];

function PaymentModal({ order, onSuccess, onCancel }) {
  const {lang,t}=useLang();
  const [step, setStep] = useState(1); // 1=summary, 2=method, 3=details, 4=processing, 5=success
  const [method, setMethod] = useState(null);
  const [phone, setPhone] = useState("");
  const [cardNum, setCardNum] = useState("");
  const [cardName, setCardName] = useState("");
  const [cardExp, setCardExp] = useState("");
  const [cardCvv, setCardCvv] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");

  const PLATFORM_FEE_PCT = 0.02;
  const productTotal = order.unitPrice * order.qty;
  const deliveryFee = order.deliveryAgent ? (order.deliveryAgent.estimatedFee || 3000) : 0;
  const platformFee = Math.round(productTotal * PLATFORM_FEE_PCT);
  const grandTotal = productTotal + deliveryFee + platformFee;
  const isCard = method?.id === "card";

  const simulatePayment = () => {
    if (isCard) {
      if (!cardNum || !cardName || !cardExp || !cardCvv) { setErr("Fill all card details"); return; }
    } else {
      if (!phone) { setErr("Enter your phone number"); return; }
      if (!pin || pin.length < 4) { setErr("Enter your 4-digit PIN"); return; }
    }
    setErr(""); setStep(4);
    setTimeout(() => {
      // Record payment
      const payments = LS.get("kp_payments", []);
      const payment = {
        id: "PAY-" + uid().toUpperCase(),
        orderId: order.id,
        orderRef: order.id,
        buyerId: order.buyerId,
        buyerName: order.buyerName,
        sellerId: order.sellerId,
        sellerName: order.sellerName,
        productName: order.productName,
        method: method.id,
        methodLabel: method.label,
        productTotal,
        deliveryFee,
        platformFee,
        grandTotal,
        status: "completed",
        date: today(),
        time: new Date().toLocaleTimeString("en-TZ", { hour: "2-digit", minute: "2-digit" }),
        timestamp: Date.now(),
      };
      LS.set("kp_payments", [...payments, payment]);
      // Update order with payment info
      const orders = LS.get("kp_orders", []);
      const updated = orders.map(o => o.id === order.id
        ? { ...o, paid: true, paymentId: payment.id, paymentMethod: method.label, status: "confirmed" }
        : o);
      LS.set("kp_orders", updated);
      setStep(5);
      setTimeout(() => onSuccess(payment), 2000);
    }, 2500);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 500, display: "flex", alignItems: "flex-end", fontFamily: "'IBM Plex Sans',system-ui,sans-serif" }}>
      <div style={{ background: T.card, borderRadius: "28px 28px 0 0", width: "100%", maxHeight: "92vh", overflowY: "auto", padding: "20px 20px 48px" }}>
        <div style={{ width: 40, height: 4, borderRadius: 4, background: T.border, margin: "0 auto 18px" }} />

        {/* Step 1 — Order Summary */}
        {step === 1 && <>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: T.text, margin: "0 0 4px", fontFamily: "'IBM Plex Serif',Georgia,serif" }}>{t("paymentSummary")}</h2>
          <p style={{ fontSize: 12, color: T.textL, margin: "0 0 16px" }}>Review your order before paying</p>
          <div style={{ background: "#f9fafb", borderRadius: 16, padding: 16, marginBottom: 14 }}>
            <p style={{ margin: "0 0 10px", fontSize: 14, fontWeight: 800, color: T.text }}>{order.icon} {order.productName}</p>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
              <span style={{ color: T.textM }}>{order.qty} {order.unitLabel}{order.qty > 1 ? "s" : ""} × TZS {fmt(order.unitPrice)}</span>
              <span style={{ fontWeight: 700 }}>TZS {fmt(productTotal)}</span>
            </div>
            {deliveryFee > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
              <span style={{ color: T.textM }}>Delivery ({order.deliveryAgent?.name})</span>
              <span style={{ fontWeight: 700 }}>TZS {fmt(deliveryFee)}</span>
            </div>}
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 10 }}>
              <span style={{ color: T.textM }}>🏛️ Platform fee (2%)</span>
              <span style={{ fontWeight: 700 }}>TZS {fmt(platformFee)}</span>
            </div>
            <div style={{ borderTop: `1px solid ${T.border}`, paddingTop: 10, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: T.text }}>Total to Pay</span>
              <span style={{ fontSize: 17, fontWeight: 900, color: T.green }}>TZS {fmt(grandTotal)}</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onCancel} style={{ flex: 1, background: "#f3f4f6", border: "none", borderRadius: 12, padding: "12px 0", fontSize: 14, fontWeight: 700, cursor: "pointer", color: T.textM, fontFamily: "inherit" }}>Cancel</button>
            <button onClick={() => setStep(2)} style={{ flex: 2, background: T.green, border: "none", borderRadius: 12, padding: "12px 0", fontSize: 14, fontWeight: 700, cursor: "pointer", color: "#fff", fontFamily: "inherit" }}>{t("payNow")} →</button>
          </div>
        </>}

        {/* Step 2 — Choose Payment Method */}
        {step === 2 && <>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: T.text, margin: "0 0 4px", fontFamily: "'IBM Plex Serif',Georgia,serif" }}>Choose Payment Method</h2>
          <p style={{ fontSize: 12, color: T.textL, margin: "0 0 16px" }}>Total: <strong style={{ color: T.green }}>TZS {fmt(grandTotal)}</strong></p>
          {PAYMENT_METHODS.map(m => (
            <button key={m.id} onClick={() => { setMethod(m); setStep(3); }}
              style={{ width: "100%", background: method?.id === m.id ? m.bg : "#fafafa", border: `2px solid ${method?.id === m.id ? m.color : T.border}`, borderRadius: 16, padding: "14px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14, marginBottom: 10, fontFamily: "inherit", textAlign: "left", transition: "all 0.15s" }}>
              <span style={{ fontSize: 28, flexShrink: 0 }}>{m.icon}</span>
              <div>
                <p style={{ margin: "0 0 2px", fontSize: 14, fontWeight: 800, color: T.text }}>{m.label}</p>
                <p style={{ margin: 0, fontSize: 11, color: T.textL }}>{m.hint}</p>
              </div>
              <span style={{ marginLeft: "auto", color: T.textL, fontSize: 18 }}>›</span>

/* ══════════════════════════════════════════════════════════════
   CHAT SYSTEM
   - All roles can chat with each other
   - Messages stored per conversation in localStorage
   - Conversation ID = sorted user IDs joined
   - Admin can read all conversations
══════════════════════════════════════════════════════════════ */

const chatKey = (uid1, uid2) => "kp_chat_" + [uid1, uid2].sort().join("_");
const allChatsKey = () => "kp_chat_index"; // list of {id, participants, lastMsg, lastTime}

function useChatWith(myId, theirId) {
  const key = chatKey(myId, theirId);
  const [messages, setMessages] = useState(() => LS.get(key, []));
  const send = (text) => {
    const msg = { id: uid(), senderId: myId, text, time: new Date().toLocaleTimeString("en-TZ", { hour: "2-digit", minute: "2-digit" }), date: today(), ts: Date.now() };
    const updated = [...messages, msg];
    LS.set(key, updated);
    setMessages(updated);
    // Update chat index
    const index = LS.get(allChatsKey(), []);
    const existing = index.find(c => c.key === key);
    const entry = { key, participants: [myId, theirId], lastMsg: text, lastTime: msg.time, lastDate: msg.date, ts: msg.ts };
    if (existing) LS.set(allChatsKey(), index.map(c => c.key === key ? entry : c));
    else LS.set(allChatsKey(), [entry, ...index]);
  };
  return { messages, send };
}

function ChatWindow({ myUser, theirUser, onClose }) {
  const {lang,t}=useLang();
  const { messages, send } = useChatWith(myUser.id, theirUser.id);
  const [text, setText] = useState("");
  const bottomRef = useRef(null);
  useEffect(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), [messages]);

  const submit = () => {
    if (!text.trim()) return;
    send(text.trim()); setText("");
  };

  const roleOf = (id) => id === myUser.id ? myUser : theirUser;

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 600, display: "flex", flexDirection: "column", background: T.bg, maxWidth: 480, margin: "0 auto", fontFamily: "'IBM Plex Sans',system-ui,sans-serif" }}>

        <button onClick={onClose} style={{ background: T.greenXL, border: "none", borderRadius: 10, padding: "7px 13px", fontSize: 13, fontWeight: 700, color: T.green, cursor: "pointer", fontFamily: "inherit" }}>← Back</button>
        <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg,${T.green},${T.greenL})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
          {ROLES[theirUser.role]?.icon || "👤"}

        <div>

          <p style={{ margin: 0, fontSize: 11, color: T.textL }}>{ROLES[theirUser.role]?.label} · {theirUser.area}</p>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 80px" }}>
        {messages.length === 0 && <div style={{ textAlign: "center", padding: "40px 0", color: T.textL }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>💬</div>
          <p style={{ fontSize: 13 }}>{t("noMessages")}</p>

        {messages.map((m, i) => {
          const isMe = m.senderId === myUser.id;

              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: T.card, padding: "12px 14px 20px", borderTop: `1px solid ${T.border}`, display: "flex", gap: 10, boxSizing: "border-box" }}>
        <input value={text} onChange={e => setText(e.target.value)} placeholder={t("typeMessage")} onKeyDown={e => e.key === "Enter" && submit()}
          style={{ flex: 1, padding: "11px 14px", borderRadius: 24, border: `1.5px solid ${T.border}`, fontSize: 13, outline: "none", fontFamily: "inherit", background: "#fafafa" }} />
        <button onClick={submit} style={{ width: 44, height: 44, borderRadius: "50%", background: T.green, border: "none", cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>➤</button>
      </div>
    </div>
  );
}

// Chat list — shows all conversations for a user
function ChatList({ user }) {
  const {lang,t}=useLang();
  const [chatWith, setChatWith] = useState(null);
  const [search, setSearch] = useState("");
  const allUsers = LS.get("kp_users", []).filter(u => u.id !== user.id);
  const filtered = allUsers.filter(u =>
    u.name.toLowerCase().includes(search.toLowerCase()) ||
    (u.area || "").toLowerCase().includes(search.toLowerCase()) ||
    (ROLES[u.role]?.label || "").toLowerCase().includes(search.toLowerCase())
  );

  const getLastMsg = (theirId) => {
    const key = chatKey(user.id, theirId);
    const msgs = LS.get(key, []);
    return msgs.length > 0 ? msgs[msgs.length - 1] : null;
  };

  const unread = (theirId) => {
    const key = chatKey(user.id, theirId);
    const msgs = LS.get(key, []);
    return msgs.filter(m => m.senderId !== user.id).length;
  };

  if (chatWith) return <ChatWindow myUser={user} theirUser={chatWith} onClose={() => setChatWith(null)} />;

  return (
    <div style={{ padding: "14px 14px 80px", fontFamily: "'IBM Plex Sans',system-ui,sans-serif" }}>
      <h2 style={{ fontSize: 18, fontWeight: 800, color: T.text, margin: "0 0 4px", fontFamily: "'IBM Plex Serif',Georgia,serif" }}>{t("messages")}</h2>
      <p style={{ fontSize: 12, color: T.textL, margin: "0 0 12px" }}>Chat with any user in the system</p>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search by name, role or area..."
        style={{ width: "100%", padding: "10px 14px", borderRadius: 12, border: `1.5px solid ${T.border}`, fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 12, fontFamily: "inherit", background: "#fafafa" }} />
      {filtered.length === 0 && <p style={{ color: T.textL, fontSize: 13, textAlign: "center", padding: "20px 0" }}>No users found.</p>}
      {filtered.map(u => {
        const last = getLastMsg(u.id);

        return (
          <div key={u.id} onClick={() => setChatWith(u)}
            style={{ background: T.card, borderRadius: 16, padding: "12px 14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "center", cursor: "pointer", boxShadow: "0 1px 6px rgba(0,0,0,0.06)", border: `1px solid ${T.border}` }}>
            <div style={{ width: 44, height: 44, borderRadius: "50%", background: `linear-gradient(135deg,${r.color||T.green},${r.color||T.greenL}88)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{r.icon || "👤"}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <p style={{ margin: "0 0 2px", fontSize: 13, fontWeight: 700, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.name}</p>
                {last && <span style={{ fontSize: 10, color: T.textL, flexShrink: 0 }}>{last.time}</span>}
              </div>
              <p style={{ margin: 0, fontSize: 11, color: T.textL }}>{lang==="sw"?r.labelSw||r.label:r.label} · {u.area}</p>
              {last && <p style={{ margin: "2px 0 0", fontSize: 11, color: T.textM, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{last.text}</p>}
            </div>
            <span style={{ color: T.textL, fontSize: 18, flexShrink: 0 }}>›</span>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PAYMENT-AWARE ORDER DETAIL FORM (replaces old OrderDetailForm)
   Adds PaymentModal trigger after order is confirmed
══════════════════════════════════════════════════════════════ */
function PayableOrderForm({ product, company, user, gps, onOrder, onCancel }) {
  const {lang,t}=useLang();
  const [qty, setQty] = useState(1);
  const [wantDelivery, setWantDelivery] = useState(false);
  const [agent, setAgent] = useState(null);
  const [pendingOrder, setPendingOrder] = useState(null); // order object waiting for payment
  const [paymentDone, setPaymentDone] = useState(false);

  const agents = getNearestAgents(company?.area || product?.area, user.area);
  const total = product.price * qty;
  const deliveryFee = agent ? agent.estimatedFee : 0;

  const buildOrder = () => ({
    id: (product.cat === "poultry" || product.cat === "eggs" || product.cat === "dairy" || product.cat === "meat" || product.cat === "live" ? "ORD-" : "SUP-") + uid().toUpperCase(),
    productId: product.id, productName: product.name, icon: product.icon,
    unitLabel: product.unitLabel, sellerId: company?.id || product?.sellerId,
    sellerName: company?.name || product?.sellerName, sellerArea: company?.area || product?.area,
    sellerPhone: product?.phone || company?.phone,
    buyerId: user.id, buyerName: user.name, buyerArea: user.area, buyerPhone: user.phone || "",
    qty, unitPrice: product.price, total,
    delivery: wantDelivery, deliveryAgent: wantDelivery ? agent : null,
    status: "pending", paid: false, date: today(),
    time: new Date().toLocaleTimeString("en-TZ", { hour: "2-digit", minute: "2-digit" }),
    type: product.sellerId ? "market" : "supply",
  });

  const handleConfirm = () => {
    if (wantDelivery && !agent) return;
    setPendingOrder(buildOrder());
  };

  const handlePaymentSuccess = (payment) => {
    const order = { ...pendingOrder, paid: true, paymentId: payment.id, paymentMethod: payment.methodLabel, status: "confirmed" };
    const saved = LS.get("kp_orders", []);
    LS.set("kp_orders", [...saved, order]);
    setPaymentDone(true);
    setTimeout(() => onOrder(order), 1500);
  };

  if (paymentDone) return (
    <div style={{ textAlign: "center", padding: "30px 0" }}>
      <div style={{ fontSize: 52, marginBottom: 10 }}>✅</div>
      <p style={{ fontSize: 15, fontWeight: 800, color: T.green, margin: "0 0 4px", fontFamily: "'IBM Plex Serif',Georgia,serif" }}>Order Placed!</p>
      <p style={{ fontSize: 12, color: T.textL }}>Payment confirmed. Redirecting...</p>
    </div>
  );

  return (
    <>
      <div style={{ background: T.card, borderRadius: 18, padding: 16, boxShadow: "0 2px 14px rgba(0,0,0,0.07)", marginBottom: 12, border: `1px solid ${T.border}` }}>
        <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14, paddingBottom: 12, borderBottom: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 44, flexShrink: 0 }}>{product.icon}</div>
          <div>
            <p style={{ margin: "0 0 2px", fontSize: 14, fontWeight: 800, color: T.text, fontFamily: "'IBM Plex Serif',Georgia,serif" }}>{product.name}</p>
            {company && <p style={{ margin: "0 0 1px", fontSize: 11, color: T.textL }}>{company.name} · 📍 {company.area || product.area}</p>}
            {product.phone && <p style={{ margin: "0 0 1px", fontSize: 11, color: T.sky }}>📞 {product.phone}</p>}
            <p style={{ margin: 0, fontSize: 13, fontWeight: 800, color: T.green }}>TZS {fmt(product.price)} {t("perUnit")} {product.unitLabel}</p>
          </div>
        </div>
        <p style={{ fontSize: 11, fontWeight: 700, color: T.textM, textTransform: "uppercase", letterSpacing: 0.8, margin: "0 0 10px" }}>{lang==="sw"?"Idadi":"Quantity"} ({product.unitLabel}s)</p>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
          <button onClick={() => setQty(q => Math.max(1, q - 1))} style={{ width: 40, height: 40, borderRadius: "50%", border: `2px solid ${T.border}`, background: "#f9fafb", fontSize: 22, cursor: "pointer", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", color: T.text }}>−</button>
          <div style={{ textAlign: "center", minWidth: 60 }}>
            <span style={{ fontSize: 28, fontWeight: 900, color: T.text }}>{qty}</span>
            <p style={{ margin: 0, fontSize: 11, color: T.textL }}>{product.unitLabel}{qty > 1 ? "s" : ""}</p>
          </div>
          <button onClick={() => setQty(q => q + 1)} style={{ width: 40, height: 40, borderRadius: "50%", border: `2px solid ${T.green}`, background: T.greenXL, fontSize: 22, cursor: "pointer", fontWeight: 700, color: T.green, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <p style={{ margin: "0 0 2px", fontSize: 12, color: T.textL }}>{t("subtotal")}</p>
            <p style={{ margin: 0, fontSize: 18, fontWeight: 900, color: T.green }}>TZS {fmt(total)}</p>
          </div>
        </div>
        <div style={{ background: T.bg, borderRadius: 10, padding: "7px 12px", marginBottom: 12, fontSize: 12, color: T.textM }}>
          {qty} {product.unitLabel}{qty > 1 ? "s" : ""} × TZS {fmt(product.price)} = <strong style={{ color: T.green }}>TZS {fmt(total)}</strong>
        </div>
        {/* Delivery toggle */}
        <div style={{ background: T.bg, borderRadius: 14, padding: 14, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: wantDelivery ? 12 : 0 }}>
            <div>
              <p style={{ margin: "0 0 2px", fontSize: 13, fontWeight: 700, color: T.text }}>{t("needDelivery")}</p>
              <p style={{ margin: 0, fontSize: 11, color: T.textL }}>Nearest agent auto-shown first</p>
            </div>
            <div style={{ position: "relative", width: 44, height: 24, cursor: "pointer" }} onClick={() => { setWantDelivery(v => !v); setAgent(null); }}>
              <div style={{ position: "absolute", inset: 0, borderRadius: 12, background: wantDelivery ? T.green : "#d1d5db", transition: "background 0.2s" }} />
              <div style={{ position: "absolute", top: 2, left: wantDelivery ? "22px" : "2px", width: 20, height: 20, borderRadius: "50%", background: "#fff", boxShadow: "0 1px 4px rgba(0,0,0,0.2)", transition: "left 0.2s" }} />
            </div>
          </div>
          {wantDelivery && agents.map(a => (
            <div key={a.id} onClick={() => setAgent(a)}
              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderRadius: 12, border: `2px solid ${agent?.id === a.id ? T.green : T.border}`, background: agent?.id === a.id ? T.greenXL : T.card, marginBottom: 7, cursor: "pointer", transition: "all 0.15s" }}>
              <div>
                <p style={{ margin: "0 0 2px", fontSize: 12, fontWeight: 700, color: T.text }}>{a.vehicle === "Motorcycle" ? "🏍️" : "🚛"} {a.name}</p>
                <p style={{ margin: 0, fontSize: 11, color: T.textL }}>{a.area} · {a.distFromSeller} km · {a.vehicle}</p>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 8 }}>
                <p style={{ margin: "0 0 2px", fontSize: 12, fontWeight: 800, color: T.amber }}>+TZS {fmt(a.estimatedFee)}</p>
                {agent?.id === a.id && <span style={{ fontSize: 10, color: T.green, fontWeight: 700 }}>{t("selected")}</span>}
              </div>
            </div>
          ))}
        </div>
        <button onClick={handleConfirm} disabled={wantDelivery && !agent}
          style={{ width: "100%", background: wantDelivery && !agent ? "#d1d5db" : T.green, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 14, fontWeight: 800, color: "#fff", cursor: wantDelivery && !agent ? "not-allowed" : "pointer", fontFamily: "inherit" }}>
          {wantDelivery && !agent ? t("selectAgentFirst") : t("proceedPayment")}
        </button>
      </div>
      {pendingOrder && <PaymentModal order={pendingOrder} onSuccess={handlePaymentSuccess} onCancel={() => setPendingOrder(null)} />}
    </>
  );
}

/* ══════════════════════════════════════════════════════════════

export default function App() {
  const [screen, setScreen] = useState("splash");
  const [user, setUser] = useState(() => LS.get("kp_session", null));
  const [lang, setLangState] = useState(() => LS.get("kp_lang", "en"));

  const setLang = (fn) => {
    setLangState(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      LS.set("kp_lang", next);
      return next;
    });
  };
  const t = makeTrans(lang);

  useEffect(() => {
    // Viewport meta for proper mobile scaling
    let meta = document.querySelector('meta[name=viewport]');
    if (!meta) { meta = document.createElement('meta'); meta.name = 'viewport'; document.head.appendChild(meta); }
    meta.content = 'width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover';
    // Global mobile CSS
    const style = document.createElement('style');
    style.textContent = `
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; overscroll-behavior: none; -webkit-text-size-adjust: 100%; height: -webkit-fill-available; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
      input, textarea, select, button { font-family: inherit; -webkit-appearance: none; }
      input[type="text"], input[type="tel"], input[type="password"], input[type="number"], textarea, select { font-size: 16px !important; }
      button { touch-action: manipulation; }
    `;
    if (!document.querySelector('#kp-global')) { style.id = 'kp-global'; document.head.appendChild(style); }
  }, []);

  useEffect(() => { if (user) setScreen("app"); }, []);

  const handleAuth = u => { LS.set("kp_session", u); setUser(u); setScreen("app"); };
  const handleLogout = () => { LS.set("kp_session", null); setUser(null); setScreen("auth"); };

  const content = (() => {
    if (screen === "splash") return <SplashScreen onStart={() => setScreen(user ? "app" : "auth")} />;
    if (screen === "auth" || !user) return <AuthScreen onAuth={handleAuth} />;
    if (user.phone === ADMIN_PHONE) return <AdminDashboard user={user} onLogout={handleLogout} />;
    switch (user.role) {
      case "farmer":     return <FarmerDashboard     user={user} onLogout={handleLogout} />;
      case "customer":   return <CustomerDashboard   user={user} onLogout={handleLogout} />;
      case "company":    return <CompanyDashboard     user={user} onLogout={handleLogout} />;
      case "delivery":   return <DeliveryDashboard   user={user} onLogout={handleLogout} />;
      case "doctor":     return <DoctorDashboard     user={user} onLogout={handleLogout} />;
      case "aggregator": return <AggregatorDashboard user={user} onLogout={handleLogout} />;
      default:           return <AuthScreen onAuth={handleAuth} />;
    }
  })();

  return (
    <LangContext.Provider value={{lang, setLang, t}}>
      {content}
    </LangContext.Provider>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f172a;padding:24px;font-family:sans-serif;box-sizing:border-box"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="color:#fff;font-size:16px;font-weight:700;margin-bottom:8px">Failed to start</div><div style="color:#94a3b8;font-size:12px;text-align:center">' + e.message + '</div></div>';
}
  </script>
</body>
</html>

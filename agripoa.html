// Haversine distance in km
const distKm = (lat1,lng1,lat2,lng2) => {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

// AI response parser
function DiagnosisView({text}) {
  const secIcons={"Likely Diagnosis":"🔬","Severity Level":"⚠️","Immediate Actions":"⚡","Home Remedies & First Aid":"🏡","When to Call a Vet":"📞","Prevention":"🛡️"};
  const sevColor=(t)=>t.includes("Critical")?T.red:t.includes("Moderate")?T.amber:T.green;
  const blocks=[];let cur=null;
  for(const line of text.split("\n")){
    const h=line.match(/^\*\*(.+?)\*\*\s*$/);
    if(h){if(cur)blocks.push(cur);cur={title:h[1],lines:[]};}
    else if(cur&&line.trim())cur.lines.push(line.replace(/\*\*/g,"").replace(/^[-•]\s*/,""));
  }
  if(cur)blocks.push(cur);
  return (<div>{blocks.map((b,i)=>{
    const isSev=b.title==="Severity Level";
    const sc=isSev?sevColor(b.lines.join(" ")):T.green;
    return(<div key={i} style={{background:isSev?(sc===T.red?T.redL:sc===T.amber?T.amberL:T.greenXL):"#f9fafb",borderRadius:14,padding:"12px 14px",marginBottom:9,borderLeft:`4px solid ${sc}`}}>
      <p style={{margin:"0 0 7px",fontSize:13,fontWeight:800,color:sc,display:"flex",alignItems:"center",gap:6}}><span>{secIcons[b.title]||"📋"}</span>{b.title}</p>
      {b.lines.map((l,j)=><p key={j} style={{margin:"0 0 4px",fontSize:12,color:T.text,lineHeight:1.55,paddingLeft:4}}>{/^\d+\./.test(l)?l:`• ${l}`}</p>)}
    </div>);
  })}
  <div style={{background:T.amberL,borderRadius:12,padding:"10px 14px",fontSize:11,color:T.soil,borderLeft:`3px solid ${T.amber}`}}><strong>Disclaimer:</strong> AI guidance only. Always consult a licensed veterinarian for proper diagnosis and treatment.</div>
  </div>);
}

// GPS Location Hook
function useGPS() {
  const [loc, setLoc] = useState(null);
  const [loading, setLoading] = useState(false);
  const detect = useCallback(() => {
    if (!navigator.geolocation) return;
    setLoading(true);
    navigator.geolocation.getCurrentPosition(
      pos => { setLoc({lat:pos.coords.latitude, lng:pos.coords.longitude}); setLoading(false); },
      ()   => { setLoading(false); },
      {timeout:8000, maximumAge:60000}
    );
  }, []);
  return {loc, loading, detect};
}

// Find nearest delivery agents to a given coord
function getNearestAgents(sellerArea, userArea) {
  const sc = coordsFor(sellerArea);
  return [...SEED_DELIVERY_AGENTS]
    .filter(a=>a.available)
    .map(a => {
      const ac = coordsFor(a.area);
      const dist = distKm(sc.lat, sc.lng, ac.lat, ac.lng);
      const estCost = Math.round(dist * a.ratePerKm / 1000) * 1000 + 3000; // base 3000
      return {...a, distFromSeller: dist.toFixed(1), estimatedFee: estCost};
    })
    .sort((a,b)=>parseFloat(a.distFromSeller)-parseFloat(b.distFromSeller));
}

// Flash Deal helpers
const isFlashActive = (p) => {
  if (!p.flashDeal) return false;
  if (!p.flashDealDate) return true;
  return p.flashDealDate === new Date().toISOString().slice(0,10);
};
const flashOriginal = (p) => p.flashOriginalPrice || p.price;
const flashDiscount = (p) => p.flashPrice ? Math.round((1 - p.flashPrice/flashOriginal(p))*100) : 0;

// Star rating renderer
const StarRating = ({rating=0, count=0, size=11}) => {
  const {t} = useLang();
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <div style={{display:"flex",alignItems:"center",gap:3}}>
      <div style={{display:"flex",gap:1}}>
        {[1,2,3,4,5].map(i => (
          <span key={i} style={{fontSize:size,color:i<=full?"#f59e0b":i===full+1&&half?"#f59e0b":"#d1d5db"}}>
            {i<=full?"★":i===full+1&&half?"⯨":"☆"}

      {count>0&&<span style={{fontSize:size-2,color:"#94a3b8"}}>({count} {t("reviewsCount")})</span>}

                  <div style={{fontSize:10,fontWeight:700,marginTop:3,lineHeight:1.2}}>{lang==="sw"?r.labelSw||r.label:r.label}</div>
                </button>
              ))}
            </div>
            {err&&<p style={{color:T.red,fontSize:12,margin:"0 0 10px"}}>{err}</p>}
            <Btn onClick={()=>{if(!role){setErr(lang==="sw"?"Chagua nafasi":"Select a role");return;}setStep(2);setErr("");}} full color={T.green}>{t("continue")} →</Btn>
          </>}
          {step===2&&<>
            <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 6px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{lang==="sw"?ROLES[role].labelSw||ROLES[role].label:ROLES[role].label}</h2>
            <p style={{fontSize:12,color:T.textL,margin:"0 0 16px"}}>{lang==="sw"?"Jaza taarifa zako":"Fill in your information"}</p>
            <Input label={t("fullName")} value={form.name} onChange={f("name")} placeholder={lang==="sw"?"Jina lako kamili":"Your full name"} required/>
            {/* Proper autocomplete for registration */}
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,fontWeight:600,color:T.textM,textTransform:"none",letterSpacing:0,display:"block",marginBottom:4}}>{t("phoneNumber")}</label>
              <input type="tel" name="phone" autoComplete="tel" inputMode="tel" value={form.phone} onChange={e=>f("phone")(e.target.value)} placeholder="e.g. 0712 345 678"
                style={{width:"100%",padding:"11px 14px",borderRadius:12,border:`1.5px solid ${T.border}`,fontSize:16,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#fafafa"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,fontWeight:600,color:T.textM,textTransform:"none",letterSpacing:0,display:"block",marginBottom:4}}>{t("password")}</label>
              <input type="password" name="password" autoComplete="new-password" value={form.password} onChange={e=>f("password")(e.target.value)} placeholder={t("createPassword")}
                style={{width:"100%",padding:"11px 14px",borderRadius:12,border:`1.5px solid ${T.border}`,fontSize:16,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#fafafa"}}/>
            </div>
            <Select label={t("area")} value={form.area} onChange={f("area")} options={HAI_AREAS}/>
            {(role==="company"||role==="aggregator")&&<Input label={t("businessName")} value={form.businessName} onChange={f("businessName")} placeholder={lang==="sw"?"Mfano: KiliAgro Supplies Ltd":"e.g. KiliAgro Supplies Ltd"}/>}
            {role==="delivery"&&<Input label={t("vehicleType")} value={form.vehicleType} onChange={f("vehicleType")} placeholder={lang==="sw"?"Mfano: Pikipiki, Gari Dogo":"e.g. Motorcycle, Pickup Truck"}/>}
            {err&&<p style={{color:T.red,fontSize:12,margin:"0 0 10px"}}>{err}</p>}
            <Btn onClick={handleRegister} full color={T.green}>{t("createAccount")}</Btn>
            <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:T.textL,fontSize:12,cursor:"pointer",display:"block",margin:"10px auto 0",fontFamily:"inherit"}}>← {t("back")}</button>
          </>}
        </>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   API KEY SETTINGS PANEL
   Farmer enters their Anthropic API key once — stored in localStorage
══════════════════════════════════════════════════════════════ */
function ApiKeyPanel({onClose}) {
  const {lang} = useLang();
  const [key, setKey] = useState(()=>localStorage.getItem("kp_apikey")||"");
  const [saved, setSaved] = useState(false);
  const save = () => {
    localStorage.setItem("kp_apikey", key.trim());
    setSaved(true);
    setTimeout(()=>{setSaved(false); onClose();}, 1200);
  };
  const clear = () => { localStorage.removeItem("kp_apikey"); setKey(""); };
  const hasKey = !!localStorage.getItem("kp_apikey");
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:500,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",padding:"20px 20px 48px",fontFamily:"'IBM Plex Sans',system-ui,sans-serif",maxWidth:480,margin:"0 auto"}}>
        <div style={{width:40,height:4,borderRadius:4,background:"#e2e8f0",margin:"0 auto 18px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>🤖</span>
          <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#0f172a",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>
            {lang==="sw"?"Ufunguo wa AI":"AI Settings"}
          </h3>
        </div>
        <p style={{margin:"0 0 16px",fontSize:12,color:"#64748b",lineHeight:1.5}}>
          {lang==="sw"
            ? "Ingiza ufunguo wako wa Anthropic API ili AI ifanye kazi. Pata ufunguo bure kutoka anthropic.com"
            : "Enter your Anthropic API key to enable AI features. Get a free key at console.anthropic.com"}
        </p>

        {hasKey && (
          <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:0,fontSize:12,fontWeight:700,color:"#166534"}}>{lang==="sw"?"✓ Ufunguo umewekwa":"✓ API Key is set"}</p>
              <p style={{margin:0,fontSize:11,color:"#16a34a"}}>sk-ant-...{(localStorage.getItem("kp_apikey")||"").slice(-6)}</p>
            </div>
            <button onClick={clear} style={{background:"none",border:"1px solid #fca5a5",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#dc2626",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
              {lang==="sw"?"Futa":"Remove"}
            </button>
          </div>
        )}

        <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:6}}>
          {lang==="sw"?"Ufunguo wa API (sk-ant-...)":"API Key (sk-ant-...)"}
        </label>
        <input
          value={key}
          onChange={e=>setKey(e.target.value)}
          placeholder="sk-ant-api03-..."
          type="password"
          style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:12,background:"#f8fafc"}}
          onFocus={e=>e.target.style.borderColor="#1f5c38"}
          onBlur={e=>e.target.style.borderColor="#e2e8f0"}
        />

        <div style={{background:"#fef9c3",borderRadius:10,padding:"10px 12px",marginBottom:14,border:"1px solid #fde047"}}>
          <p style={{margin:0,fontSize:11,color:"#854d0e",lineHeight:1.5}}>
            {lang==="sw"
              ? "🔒 Ufunguo huhifadhiwa kwenye simu yako tu — hautumwi nje. Hakuna mtu mwingine anayeweza kuuona."
              : "🔒 Your key is stored only on this phone — never sent anywhere else. No one else can see it."}
          </p>
        </div>

        <button onClick={save} disabled={!key.trim()}
          style={{width:"100%",background:key.trim()?"#1f5c38":"#d1d5db",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:key.trim()?"pointer":"not-allowed",fontFamily:"inherit",transition:"background 0.2s"}}>
          {saved?"✓ Saved!":lang==="sw"?"Hifadhi Ufunguo":"Save API Key"}
        </button>

        <p style={{margin:"10px 0 0",fontSize:11,color:"#94a3b8",textAlign:"center"}}>
          {lang==="sw"?"Pata ufunguo: console.anthropic.com":"Get your key: console.anthropic.com"}
        </p>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   GPS LOCATION BANNER
══════════════════════════════════════════════════════════════ */
function LocationBanner({gps}) {
  const {lang,t}=useLang();
  if (!gps.loc && !gps.loading) return (
    <div onClick={gps.detect} style={{background:T.amberL,borderRadius:12,padding:"9px 14px",marginBottom:12,display:"flex",gap:8,alignItems:"center",cursor:"pointer",border:`1px dashed ${T.amber}`}}>
      <span style={{fontSize:18}}>📍</span>
      <div style={{flex:1}}>
        <p style={{margin:"0 0 1px",fontSize:12,fontWeight:700,color:T.amber}}>{t("enableLocation")}</p>
        <p style={{margin:0,fontSize:11,color:T.textM}}>Tap to detect your location for nearby results</p>
      </div>
      <span style={{color:T.amber,fontSize:16}}>›</span>
    </div>
  );
  if (gps.loading) return <div style={{background:T.greenXL,borderRadius:12,padding:"9px 14px",marginBottom:12,fontSize:12,color:T.green}}>Detecting your location...</div>;
  if (gps.loc) return <div style={{background:T.greenXL,borderRadius:12,padding:"8px 14px",marginBottom:12,fontSize:12,color:T.green,display:"flex",gap:6,alignItems:"center"}}>
    <span>✅</span><span style={{fontWeight:700}}>{t("locationDetected")}</span><span style={{color:T.textL}}>· {gps.loc.lat.toFixed(4)}, {gps.loc.lng.toFixed(4)}</span>
  </div>;
  return null;
}

/* ══════════════════════════════════════════════════════════════
   COMPANY ORDER FLOW
   Step 1: Choose Company → Step 2: Choose Products → Step 3: Qty & Delivery
══════════════════════════════════════════════════════════════ */
function CompanyOrderFlow({user, orders, setOrders, gps}) {
  const {lang,t}=useLang();
  const [step, setStep] = useState(1);          // 1=choose company, 2=choose product, 3=order
  const [company, setCompany] = useState(null);
  const [product, setProduct] = useState(null);
  const [cat, setCat] = useState("all");
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  // Get company products
  const companyProducts = company ? SEED_COMPANY_PRODUCTS.filter(p=>p.companyId===company.id&&(cat==="all"||p.cat===cat)) : [];

  // Sort companies by distance if GPS available
  const sortedCompanies = [...SEED_COMPANIES].map(c=>{
    const cc=coordsFor(c.area);
    const uc=gps.loc||coordsFor(user.area);
    return {...c, dist:distKm(uc.lat,uc.lng,cc.lat,cc.lng)};
  }).sort((a,b)=>a.dist-b.dist);

  const placeOrder = (qty, wantDelivery, agent) => {
    const o={id:"SUP-"+uid().toUpperCase(),productId:product.id,productName:product.name,icon:product.icon,
      unitLabel:product.unitLabel,sellerId:company.id,sellerName:company.name,sellerArea:company.area,
      buyerId:user.id,buyerName:user.name,buyerArea:user.area,qty,
      unitPrice:product.price,total:product.price*qty,
      delivery:wantDelivery,deliveryAgent:wantDelivery?agent:null,
      status:"pending",date:today(),type:"supply"};
    const saved=LS.get("kp_orders",[]);
    LS.set("kp_orders",[...saved,o]);
    setOrders(prev=>[...prev,o]);
    setStep(1); setCompany(null); setProduct(null);
    showToast(`✅ ${lang==="sw"?"Agizo limewekwa kwa":"Order placed with"} ${company.name}!`);
  };

  return (
    <div style={{padding:"14px 14px 0"}}>
      {toast&&<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:T.green,color:"#fff",padding:"9px 22px",borderRadius:6,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Featured Company Ads */}
      <div style={{marginBottom:14}}>
        <p style={{fontSize:11,fontWeight:700,color:T.textL,textTransform:"none",letterSpacing:0,margin:"0 0 8px"}}>{t("companyAds")}</p>
        <div style={{display:"flex",gap:10,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:6,scrollbarWidth:"none"}}>
          {SEED_COMPANY_PRODUCTS.filter(p=>p.advert).map(p=>(
            <div key={p.id} onClick={()=>{const c=SEED_COMPANIES.find(c=>c.id===p.companyId);setCompany(c);setProduct(p);setStep(3);}}
              style={{flexShrink:0,width:180,background:T.card,borderRadius:8,padding:12,cursor:"pointer",color:T.text,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:30,marginBottom:6}}>{p.icon}</div>
              <p style={{margin:"0 0 1px",fontSize:13,fontWeight:800,lineHeight:1.2}}>{p.name}</p>
              <p style={{margin:"0 0 6px",fontSize:10,opacity:0.8}}>{p.companyName}</p>
              <p style={{margin:0,fontSize:11,fontWeight:700,background:"rgba(255,255,255,0.2)",borderRadius:8,padding:"3px 8px",display:"inline-block"}}>TZS {fmt(p.price)}/{p.unitLabel}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Step indicator */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[t("stepChooseCompany"),t("stepChooseProduct"),t("stepPlaceOrder")].map((s,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:5,borderRadius:4,background:step>i?T.sky:T.border,marginBottom:4,transition:"background 0.3s"}}/>
            <p style={{fontSize:9,color:step>i?T.sky:T.textL,fontWeight:700,margin:0,textTransform:"uppercase"}}>{s}</p>
          </div>
        ))}
      </div>

      {/* STEP 1: Choose Company */}
      {step===1&&<>
        <h3 style={{fontSize:16,fontWeight:800,color:T.text,margin:"0 0 4px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{t("chooseCompany")}</h3>
        <p style={{fontSize:12,color:T.textL,margin:"0 0 12px"}}>{t("companiesSorted")}</p>
        <LocationBanner gps={gps}/>
        {sortedCompanies.map(c=>(
          <div key={c.id} onClick={()=>{setCompany(c);setCat("all");setStep(2);}}
            style={{background:T.card,borderRadius:16,padding:16,marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.07)",border:`1px solid ${T.border}`,cursor:"pointer",transition:"all 0.15s"}}
            onMouseDown={e=>e.currentTarget.style.borderColor=T.sky}
            onMouseUp={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <p style={{margin:"0 0 3px",fontSize:15,fontWeight:800,color:T.text}}>{c.name}</p>
                <p style={{margin:"0 0 3px",fontSize:11,color:T.textM}}>{c.area} · {c.dist.toFixed(1)} km away</p>
                <p style={{margin:"0 0 6px",fontSize:11,color:T.textL}}>{c.desc}</p>
                <p style={{margin:0,fontSize:12,color:T.sky,fontWeight:600}}>📞 {c.phone}</p>
              </div>
              <span style={{color:T.sky,fontSize:22,flexShrink:0,marginLeft:8}}>›</span>
            </div>
          </div>
        ))}
      </>}

      {/* STEP 2: Choose Product from Company */}
      {step===2&&company&&<>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          <button onClick={()=>{setStep(1);setCompany(null);}} style={{background:T.skyL,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,fontWeight:700,color:T.sky,cursor:"pointer",fontFamily:"inherit"}}>{t("backBtn")}</button>
          <div>
            <p style={{margin:"0 0 1px",fontSize:15,fontWeight:800,color:T.text,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{company.name}</p>
            <p style={{margin:0,fontSize:11,color:T.textL}}>{company.area} · 📞 {company.phone}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:7,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:8,marginBottom:14,scrollbarWidth:"none"}}>
          {COMPANY_CATS.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{flexShrink:0,padding:"6px 14px",borderRadius:20,border:"none",background:cat===c.id?T.sky:"#f0f0f0",color:cat===c.id?"#fff":T.textM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              {c.icon} {lang==="sw"?c.labelSw||c.label:c.label}
            </button>
          ))}
        </div>
        {companyProducts.length===0&&<p style={{color:T.textL,fontSize:13,textAlign:"center",padding:"20px 0"}}>{t("noCategoryProducts")}</p>}
        {companyProducts.map(p=>(
          <div key={p.id} onClick={()=>{setProduct(p);setStep(3);}} style={{background:T.card,borderRadius:8,padding:12,marginBottom:8,boxShadow:"none",border:`1px solid ${T.border}`,cursor:"pointer",display:"flex",gap:12,alignItems:"center",transition:"all 0.15s"}}
            onMouseDown={e=>e.currentTarget.style.borderColor=T.sky}
            onMouseUp={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{fontSize:38,flexShrink:0}}>{p.icon}{p.advert&&<div style={{fontSize:9,textAlign:"center",color:T.amber,fontWeight:800}}>AD</div>}</div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 2px",fontSize:13,fontWeight:800,color:T.text}}>{p.name}</p>
              <p style={{margin:"0 0 3px",fontSize:11,color:T.textL}}>{p.desc}</p>
              <p style={{margin:0,fontSize:14,fontWeight:800,color:T.sky}}>TZS {fmt(p.price)} <span style={{fontSize:11,color:T.textL,fontWeight:400}}>{t("perUnit")} {p.unitLabel}</span></p>
            </div>
            <span style={{color:T.sky,fontSize:22,flexShrink:0}}>›</span>
          </div>
        ))}
      </>}

      {/* STEP 3: Qty, Delivery & Payment */}
      {step===3&&company&&product&&<>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          <button onClick={()=>setStep(2)} style={{background:T.skyL,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,fontWeight:700,color:T.sky,cursor:"pointer",fontFamily:"inherit"}}>{t("backBtn")}</button>
          <p style={{margin:0,fontSize:14,fontWeight:800,color:T.text,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{t("placeOrder")}</p>

}

/* ══════════════════════════════════════════════════════════════
   ORDER TRACKING TIMELINE
══════════════════════════════════════════════════════════════ */
function OrderTimeline({status}) {
  const {t} = useLang();
  const steps = [
    {key:"pending",    label:{en:"Placed",     sw:"Imewekwa"},    icon:"📋"},
    {key:"processing", label:{en:"Confirmed",  sw:"Imethibitishwa"},icon:"✓"},
    {key:"in_transit", label:{en:"On the Way", sw:"Inakuja"},     icon:"🚚"},
    {key:"delivered",  label:{en:"Delivered",  sw:"Imefikishwa"},  icon:"✓"},
  ];
  const ORDER = ["pending","processing","in_transit","delivered"];
  const currentIdx = status==="cancelled" ? -1 : ORDER.indexOf(status);

  if (status==="cancelled") return (
    <div style={{background:"#fef2f2",borderRadius:10,padding:"10px 14px",marginBottom:8,border:"1px solid #fecaca"}}>
      <p style={{margin:0,fontSize:12,fontWeight:700,color:"#dc2626"}}>Order Cancelled</p>
    </div>
  );

  return (
    <div style={{marginBottom:12,padding:"12px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
      <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.6}}>{t("orderTimeline")}</p>
      <div style={{display:"flex",alignItems:"flex-start",position:"relative"}}>
        {/* Progress line */}
        <div style={{position:"absolute",top:14,left:14,right:14,height:2,background:"#e2e8f0",zIndex:0}}/>
        <div style={{position:"absolute",top:14,left:14,height:2,background:"#1f5c38",zIndex:1,
          width:currentIdx<=0?"0%":currentIdx===1?"33%":currentIdx===2?"66%":"100%",
          transition:"width 0.4s ease"}}/>
        {steps.map((s,i) => {
          const done = i < currentIdx;
          const active = i === currentIdx;
          return (
            <div key={s.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative",zIndex:2}}>
              <div style={{
                width:28,height:28,borderRadius:"50%",
                background:done||active?"#1f5c38":"#fff",
                border:`2px solid ${done||active?"#1f5c38":"#d1d5db"}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:done?12:active?10:10,
                color:done||active?"#fff":"#94a3b8",
                fontWeight:800,marginBottom:6,
                boxShadow:active?"0 0 0 3px rgba(31,92,56,0.2)":"none",
                transition:"all 0.3s"
              }}>
                {done?"✓":active?<span style={{animation:"pulse 1.5s infinite"}}>●</span>:i+1}
              </div>
              <p style={{margin:0,fontSize:9,fontWeight:active?800:600,
                color:active?"#1f5c38":done?"#475569":"#94a3b8",
                textAlign:"center",lineHeight:1.2,maxWidth:60}}>
                {s.label.en}
              </p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    if (!text.trim()) return;
    onSubmit({orderId:order.id, sellerId:order.sellerId, sellerName:order.sellerName,

          {[1,2,3,4,5].map(s=>(
            <button key={s} onClick={()=>setStars(s)}
              style={{background:"none",border:"none",fontSize:32,cursor:"pointer",color:s<=stars?"#f59e0b":"#d1d5db",transition:"transform 0.1s",transform:s<=stars?"scale(1.1)":"scale(1)"}}>

function MarketBrowse({user, products, setProducts, orders, setOrders, gps}) {
  const {lang,t}=useLang();

  const [maxPrice, setMaxPrice] = useState("");
  const [showFilters, setShowFilters] = useState(false);
  const [savedIds, setSavedIds] = useState(()=>LS.get("kp_saved_"+user.id,[]));
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  const userCoord = gps.loc || coordsFor(user.area);

  // Reviews from localStorage
  const allReviews = LS.get("kp_reviews",[]);

  // Products enriched with distance + live rating
  const enriched = products.map(p => {
    const pc = coordsFor(p.area);
    const dist = distKm(userCoord.lat,userCoord.lng,pc.lat,pc.lng);
    const revs = allReviews.filter(r=>r.sellerId===p.sellerId);
    const avgRating = revs.length>0 ? (revs.reduce((s,r)=>s+r.stars,0)/revs.length) : (p.rating||0);
    const rCount = revs.length>0 ? revs.length : (p.ratingCount||0);
    return {...p, dist, avgRating, rCount};
  });

  const flashDeals = enriched.filter(p=>isFlashActive(p));

  const filtered = enriched
    .filter(p=>(cat==="all"||p.cat===cat)
      &&(p.name.toLowerCase().includes(search.toLowerCase())||p.sellerName.toLowerCase().includes(search.toLowerCase()))
      &&(!maxPrice||p.price<=parseInt(maxPrice)))
    .sort((a,b)=>a.dist-b.dist);

  const toggleSave = (id) => {
    const next = savedIds.includes(id)?savedIds.filter(x=>x!==id):[...savedIds,id];
    setSavedIds(next); LS.set("kp_saved_"+user.id, next);

  const handleReview = (review) => {
    const saved = LS.get("kp_reviews",[]);
    LS.set("kp_reviews",[...saved, review]);

  // Orders eligible for review (delivered, not yet reviewed)

const daysSince = (dateStr) => {
  if (!dateStr) return 0;
  const d = new Date(dateStr); const now = new Date();
  return Math.max(0, Math.floor((now - d) / 86400000));
};
const addDays = (dateStr, n) => {

// ── ANTHROPIC API CALL (CORS-safe for browser) ────────────────
// Direct browser → Anthropic calls are blocked by CORS.
// We route through a CORS proxy so the app works without a backend.
async function callClaude(prompt, maxTokens=500) {
  const TARGETS = [
    // Primary: corsproxy.io
    {
      url: "https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages"),
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "",           // injected by proxy passthrough
        "anthropic-version": "2023-06-01",
      }
    },
    // Fallback: allorigins
    {
      url: "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://api.anthropic.com/v1/messages"),
      headers: { "Content-Type": "application/json" }
    }
  ];

  // Read API key from localStorage (farmer sets it once in Settings)
  const apiKey = localStorage.getItem("kp_apikey") || "";
  if (!apiKey) throw new Error("No API key set — tap 🤖 in the header to add your key");

  const body = JSON.stringify({
    model: "claude-haiku-4-5-20251001",
    max_tokens: maxTokens,
    messages: [{ role: "user", content: prompt }]
  });

  for (const target of TARGETS) {
    try {
      const headers = { ...target.headers, "x-api-key": apiKey, "anthropic-version": "2023-06-01" };
      const res = await fetch(target.url, {
        method: "POST",
        headers,
        body,
        signal: AbortSignal.timeout(30000)
      });
      if (!res.ok) continue;
      const data = await res.json();
      if (data?.content) return data.content.map(b=>b.text||"").join("\n");
    } catch(e) { continue; }
  }
  throw new Error("AI unavailable — check internet connection");
}

      ]
    },
    sheep: {
      phases: [
        { days: [1,30],  phase: "Adaptation",
          feed: "Good pasture or hay — 1.5-2kg/day. Mineral lick. Ewes with lambs: +200g concentrate.",
          health: "Deworm on arrival. Foot rot inspection and treatment. Dip for external parasites.",
          vaccines: "Clostridial diseases (Pulpy Kidney, Tetanus) — Covexin or Multivax",
          warnings: "Respiratory disease risk in first 2 weeks. Pneumonia kills quickly in sheep."
        },
        { days: [31,90], phase: "Production",
          feed: "Pasture + 1.5-2.5kg hay. Lactating ewes +300g concentrate. Mineral lick available.",
          health: "Monthly FAMACHA check for Haemonchus. Foot trimming every 6 weeks.",
          vaccines: "Rift Valley Fever if outbreak risk in region",
          expected_production: "Lambing rate 100-150%. Growth rate 150-200g/day for lambs.",
          warnings: "Bloat risk on lush pasture — graze after dew dries. Flystrike in wet season."
        },
      ]
    },
  };

  const animalKey = type === "broilers" ? "broilers" :
                    type === "layers" || type === "kienyeji" ? type :
                    flock.animalType === "goats" ? "goats" :
                    flock.animalType === "cattle" ? "cattle" :
                    flock.animalType === "sheep" ? "sheep" : "broilers";

  const animalProtocol = protocols[animalKey];
  if (!animalProtocol) return null;

  // Find the matching phase for current day
  const phase = animalProtocol.phases.find(p => dayNum >= p.days[0] && dayNum <= p.days[1])
    || animalProtocol.phases[animalProtocol.phases.length - 1];

  return { phase, weekNum, animalKey };
}

function parseScheduleMilestones(text) {
  if (!text) return [];
  const lines = text.split("\n").filter(l => /^DAY\s+\d+:/i.test(l.trim()));
  return lines.map(l => {
    const m = l.match(/^DAY\s+(\d+):\s*(.+)/i);
    return m ? {day:parseInt(m[1]), task:m[2].trim()} : null;
  }).filter(Boolean);
}

      <Btn onClick={run} full disabled={loading} color={T.blue} style={{marginBottom:14,padding:13}}>
        {loading?"⚙️ Analysing...":"🤖 Get AI Diagnosis"}
      </Btn>
      {loading&&<Spinner msg="AI is analysing symptoms..."/>}
      {diagnosis&&<div ref={diagRef}><DiagnosisView text={diagnosis}/></div>}
    </div>
  );
}

/* ── FLOCK DASHBOARD (full detail, sub-tabs) ─────────────────── */
function FlockDashboard({flock, allFlocks, setFlocks, onBack}) {
  const {lang,t}=useLang();
  const [subTab, setSubTab] = useState("today");
  const [loadingSchedule, setLoadingSchedule] = useState(false);
  const [loadingDaily, setLoadingDaily] = useState(false);
  const [dailyAdvice, setDailyAdvice] = useState(null);
  const [showMissed, setShowMissed] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const dayNum = daysSince(flock.intakeDate) + 1;
  const pt = POULTRY_TYPES.find(p=>p.id===flock.poultryType);
  const at = ANIMALS.find(a=>a.id===flock.animalType);
  const milestones = parseScheduleMilestones(flock.adjustedSchedule||flock.schedule||"");
  const todayMs = milestones.find(m=>m.day===dayNum) || [...milestones].reverse().find(m=>m.day<=dayNum);
  const nextMs = milestones.find(m=>m.day>dayNum);
  const todayLog = flock.dayLog?.[dayNum];
  const missedDays = Object.entries(flock.dayLog||{}).filter(([,v])=>v.done===false).map(([k])=>parseInt(k));
  const upd = (updates) => setFlocks(fs=>fs.map(f=>f.id===flock.id?{...f,...updates}:f));

  useEffect(()=>{
    if (!flock.schedule && !flock._gen) {
      upd({_gen:true});
      aiGrowthSchedule({...flock,_lang:lang}).then(text=>upd({schedule:text,_gen:false})).catch(()=>upd({_gen:false}));
    }
  },[]);

  const getDailyAdvice = async () => {
    if (!flock.schedule) return;
    setLoadingDaily(true);
    try {const a = await aiDailyAdvice(flock,dayNum,flock.schedule); setDailyAdvice(a);}
    catch(e){showToast("Could not load AI advice.");}

  };

  const markDay = (done) => {
    if (!done) {setShowMissed(true); return;}
    const newLog = {...(flock.dayLog||{}),[dayNum]:{done:true,note:"",date:today()}};
    upd({dayLog:newLog}); showToast("✅ Day marked complete!");
  };

  const STABS=[{id:"today",label:t("tabToday"),icon:"📅"},{id:"schedule",label:t("tabScheduleLabel"),icon:"📋"},{id:"health",label:t("tabHealthLabel"),icon:"🩺"},{id:"log",label:t("tabLogLabel"),icon:"📝"}];

  return (
    <div style={{fontFamily:"'IBM Plex Sans',system-ui,sans-serif",height:"100%",display:"flex",flexDirection:"column"}}>

      <div style={{background:`linear-gradient(135deg,${T.green},${T.greenL})`,padding:"14px 16px 18px",color:"#fff",flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:10,padding:"5px 13px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>← {t("backBtn")}</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <p style={{margin:"0 0 2px",color:"rgba(255,255,255,0.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{t("flockDashboard")}</p>
            <h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{pt?.icon||at?.icon} {flock.breed}</h2>
            <p style={{margin:0,fontSize:11,opacity:0.8}}>{flock.total} {lang==="sw"?"wanyama":"animals"} · {t("intakeLabel")}: {flock.intakeDate}</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.2)",borderRadius:14,padding:"9px 14px",textAlign:"center",flexShrink:0}}>
            <p style={{margin:0,fontSize:26,fontWeight:900,lineHeight:1}}>D{dayNum}</p>
            <p style={{margin:0,fontSize:9,opacity:0.8,textTransform:"uppercase"}}>{t("todayLabel2")}</p>
          </div>
        </div>
      </div>
      <div style={{background:T.card,display:"flex",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        {STABS.map(t=>(
          <button key={t.id} onClick={()=>setSubTab(t.id)}
            style={{flex:1,background:"none",border:"none",borderBottom:`3px solid ${subTab===t.id?T.green:"transparent"}`,padding:"9px 4px 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"inherit"}}>
            <span style={{fontSize:subTab===t.id?17:15,opacity:subTab===t.id?1:0.5}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:subTab===t.id?T.green:T.textL,textTransform:"uppercase"}}>{t.label}</span>
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"14px 14px 80px"}}>
        {subTab==="today"&&<>
          {(flock._gen||loadingSchedule)&&<Spinner msg={t("generatingSchedule")}/>}
          {!flock.schedule&&!flock._gen&&<div style={{background:T.amberL,borderRadius:14,padding:14,borderLeft:`4px solid ${T.amber}`,marginBottom:12}}>
            <p style={{margin:"0 0 4px",fontSize:13,fontWeight:700,color:T.amber}}>⏳ {t("schedulePending")}</p>
            <p style={{margin:0,fontSize:12,color:T.textM}}>{t("connectInternet")}</p>
          </div>}
          {flock.schedule&&<>
            {flock.animalType==="poultry"&&flock.poultryType==="broilers"&&(
              <Card style={{borderLeft:`4px solid ${T.green}`}}>
                <p style={{fontSize:11,fontWeight:700,color:T.textM,textTransform:"uppercase",letterSpacing:0.8,margin:"0 0 6px"}}>{t("broilerCycleProgress")}</p>
                <div style={{background:"#e5e7eb",borderRadius:8,height:10,overflow:"hidden",marginBottom:5}}>
                  <div style={{background:`linear-gradient(90deg,${T.green},${T.greenL})`,width:`${Math.min(100,(dayNum/42)*100)}%`,height:"100%",borderRadius:8}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textL}}>
                  <span>Day 1</span><span style={{fontWeight:700,color:T.green}}>{t("dayLabel")} {dayNum}</span><span>Day 42</span>
                </div>
              </Card>
            )}
            {todayMs&&<Card style={{background:"#f0faf4",border:`2px solid ${T.green}40`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:T.green}}>{t("dayLabel")} {dayNum} — {t("todayLabel")}</p>
                {todayLog?.done===true&&<span style={{background:T.greenXL,color:T.green,fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{t("doneLabel")}</span>}
                {todayLog?.done===false&&<span style={{background:T.redL,color:T.red,fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{t("missedLabel")}</span>}
              </div>
              <p style={{margin:"0 0 10px",fontSize:13,color:T.text,lineHeight:1.55}}>{todayMs.task}</p>
              {!todayLog&&<div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>markDay(true)} small color={T.green} style={{flex:1}}>{t("iDidThis")}</Btn>
                <Btn onClick={()=>markDay(false)} small outline color={T.red} style={{flex:1}}>{t("iDidntDo")}</Btn>
              </div>}
            </Card>}
            {!dailyAdvice&&!loadingDaily&&<Btn onClick={getDailyAdvice} full color={T.sky} style={{marginBottom:12}}>🤖 {t("getAiAdvice")} →</Btn>}
            {loadingDaily&&<Spinner msg={t("generatingAdvice")}/>}
            {dailyAdvice&&<Card style={{borderLeft:`4px solid ${T.sky}`,padding:0,overflow:"hidden"}}>
              <div style={{background:T.sky,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🤖</span>
                <div>
                  <p style={{margin:0,fontSize:13,fontWeight:800,color:"#fff"}}>{t("todayAiAdvice")}</p>
                  <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.8)"}}>{lang==="sw"?"Siku":"Day"} {dayNum} · {lang==="sw"?"Wiki":"Week"} {Math.ceil(dayNum/7)}</p>
                </div>
              </div>
              <div style={{padding:"12px 14px"}}>
                {dailyAdvice.split("\n").filter(l=>l.trim()).map((l,i)=>{
                  const clean = l.replace(/\*\*/g,"");
                  const isHeader = l.startsWith("**") || l.match(/^[A-Z][^:]+:/);
                  const sectionIcons = {
                    "Feed":"🌽","Chakula":"🌽",
                    "Water":"💧","Maji":"💧",
                    "Temp":"🌡️","Joto":"🌡️",
                    "Vaccine":"💉","Dawa":"💉","Chanjo":"💉",
                    "Weight":"⚖️","Uzito":"⚖️","Expected":"⚖️",
                    "Watch":"⚠️","Angalia":"⚠️",
                    "Tip":"💡","Kidokezo":"💡","Practical":"💡",
                  };
                  const icon = Object.entries(sectionIcons).find(([k])=>clean.startsWith(k))?.[1]||null;
                  if (isHeader) return (
                    <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${T.border}`}}>
                      {icon&&<span style={{fontSize:18,flexShrink:0,marginTop:1}}>{icon}</span>}
                      <div style={{flex:1}}>
                        <p style={{margin:0,fontSize:12,fontWeight:800,color:T.text,lineHeight:1.5}}>{clean}</p>
                      </div>
                    </div>
                  );
                  return <p key={i} style={{margin:"0 0 4px",fontSize:12,color:T.textM,lineHeight:1.5,paddingLeft:4}}>{clean}</p>;
                })}
              </div>
            </Card>}
            {nextMs&&<Card>
              <p style={{fontSize:11,fontWeight:700,color:T.textM,textTransform:"none",letterSpacing:0,margin:"0 0 5px"}}>⏭ {t("nextLabel")} — {t("dayLabel")} {nextMs.day} ({nextMs.day-dayNum} {t("daysAway")})</p>
              <p style={{margin:"0 0 3px",fontSize:11,color:T.textL}}>{addDays(flock.intakeDate,nextMs.day-1)}</p>
              <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{nextMs.task}</p>
            </Card>}
            {missedDays.length>0&&<Card style={{borderLeft:`4px solid ${T.red}`,background:T.redL}}>
              <p style={{margin:"0 0 4px",fontSize:13,fontWeight:800,color:T.red}}>{missedDays.length} {t("missedDayCount")}{missedDays.length>1&&lang!=="sw"?"s":""}</p>
              <p style={{margin:"0 0 8px",fontSize:12,color:T.textM}}>{lang==="sw"?"Siku":"Days"} {missedDays.join(", ")} {t("missedDays2")}</p>
              <Btn onClick={()=>setShowMissed(true)} small color={T.red}>🔄 {t("recalcSchedule")}</Btn>
            </Card>}
          </>}
        </>}
        {subTab==="schedule"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{fontSize:16,fontWeight:800,color:T.text,margin:0,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>
              {flock.adjustedSchedule?"🔄 "+t("adjustedSchedule"):"📋 "+t("aiGrowthSchedule")}
            </h3>
            {flock.adjustedSchedule&&<span style={{background:"#ede9fe",color:"#7c3aed",fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{t("recalculated")}</span>}
          </div>
          {milestones.length===0&&<Spinner msg={t("generatingSchedule")}/>}
          {milestones.map((m,i)=>{
            const isDone=flock.dayLog?.[m.day]?.done===true, isMissed=flock.dayLog?.[m.day]?.done===false;
            const isToday=m.day===dayNum, isFuture=m.day>dayNum;
            return (<div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                <div style={{width:34,height:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,
                  background:isDone?T.green:isMissed?T.red:isToday?T.sky:isFuture?"#e5e7eb":"#f0f0f0",
                  color:isDone||isMissed||isToday?"#fff":T.textL,border:isToday?`3px solid ${T.sky}`:undefined}}>
                  {isDone?"✓":isMissed?"✗":m.day}
                </div>
                {i<milestones.length-1&&<div style={{width:2,height:14,background:isDone?"#e6f4ec":"#e5e7eb",margin:"3px 0"}}/>}
              </div>
              <div style={{flex:1,background:isToday?"#e0f2fe":isDone?"#f0faf4":isMissed?"#fee2e2":"#fafafa",borderRadius:12,padding:"9px 12px",border:`1px solid ${isToday?T.sky:isDone?T.green+"44":isMissed?T.red+"44":T.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <p style={{margin:0,fontSize:11,fontWeight:800,color:isToday?T.sky:T.textM,textTransform:"uppercase"}}>Day {m.day}{isToday?" ← "+t("todayLabel"):""}</p>
                  <span style={{fontSize:10,color:"#64748b"}}>{addDays(flock.intakeDate,m.day-1)}</span>
                </div>
                <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{m.task}</p>
              </div>
            </div>);
          })}
        </>}
        {subTab==="health"&&<FlockHealthTab flock={flock} dayNum={dayNum}/>}
        {subTab==="log"&&<>
          <h3 style={{fontSize:16,fontWeight:800,color:T.text,margin:"0 0 12px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>📝 {t("dailyLogTitle")}</h3>
          {Object.keys(flock.dayLog||{}).length===0&&<p style={{color:T.textL,fontSize:13,textAlign:"center",padding:"20px 0"}}>{t("noEntriesYet")}</p>}
          {Object.entries(flock.dayLog||{}).sort(([a],[b])=>parseInt(b)-parseInt(a)).map(([day,entry])=>(
            <Card key={day}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div>
                  <p style={{margin:"0 0 2px",fontSize:13,fontWeight:800,color:T.text}}>Day {day}</p>
                  {entry.whatHappened&&<p style={{margin:"0 0 2px",fontSize:12,color:T.textM}}>"{entry.whatHappened}"</p>}
                  <p style={{margin:0,fontSize:10,color:"#64748b"}}>{entry.date}</p>
                </div>
                <span style={{background:entry.done?T.greenXL:T.redL,color:entry.done?T.green:T.red,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,alignSelf:"flex-start"}}>{entry.done?t("doneLabel"):t("missedLabel")}</span>
              </div>
            </Card>
          ))}
        </>}
      </div>
      {showMissed&&<MissedDayModal flock={flock} dayNum={dayNum} missedDays={missedDays} onClose={()=>setShowMissed(false)}
        onSubmit={(note,recalc)=>{
          const newLog={...flock.dayLog,[dayNum]:{done:false,whatHappened:note,date:today()}};
          upd({dayLog:newLog,adjustedSchedule:recalc||flock.adjustedSchedule,_lang:lang});
          setShowMissed(false); showToast(lang==="sw"?"🔄 Ratiba imehesabiwa upya!":"🔄 Schedule recalculated!");
        }}/>}
    </div>
  );
}

    else if (cat==="eggs") extraLabel=eggType==="natural"?"Natural/Kienyeji":"Layer eggs";

  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={onClose}>

        {/* Photo upload */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:600,color:T.textM,display:"block",marginBottom:6}}>Product Photo</label>
          <div style={{position:"relative",height:140,borderRadius:12,border:`2px dashed ${photo?T.green:T.border}`,background:photo?"transparent":"#f8fafc",overflow:"hidden",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
            onClick={()=>document.getElementById("kp-photo-input").click()}>
            {photo
              ?<img src={photo} alt="product" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{textAlign:"center",color:T.textL}}>
                <div style={{fontSize:28,marginBottom:4}}>📷</div>

              const file = e.target.files[0];

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          <Input label={t("stockUnits")} value={qty} onChange={setQty} placeholder="e.g. 40" type="number"/>

          <p style={{margin:0,fontSize:13,fontWeight:800,color:T.green}}>TZS {fmt(parseInt(price)||0)} / {unitOf[cat]||"unit"}</p>

            </div>
            <div style={{position:"relative",width:44,height:24,cursor:"pointer"}} onClick={()=>{setFlashDeal(v=>!v);setFlashPrice("");}}>
              <div style={{position:"absolute",inset:0,borderRadius:12,background:flashDeal?T.amber:"#d1d5db",transition:"background 0.2s"}}/>
              <div style={{position:"absolute",top:2,left:flashDeal?"22px":"2px",width:20,height:20,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.2)",transition:"left 0.2s"}}/>

          </div>
          {flashDeal&&<div style={{marginTop:10}}>
            <label style={{fontSize:11,fontWeight:600,color:T.soil,display:"block",marginBottom:4}}>Deal Price (TZS) — lower than normal</label>

        <Btn onClick={submit} full color={T.green}>{t("listThisProduct")}</Btn>
      </div>
    </div>
  );
}

/* ── NEEDS BOARD ─────────────────────────────────────────────
   isMyNeeds=true  → Customer: can post needs, see all needs + manage their own
   isMyNeeds=false → Farmer / Company / Aggregator: sees all customer needs, can respond
──────────────────────────────────────────────────────────── */
function NeedsBoard({user, isMyNeeds=false}) {
  const {lang,t}=useLang();
  const [needs, setNeeds] = useState(()=>LS.get("kp_needs",[]));
  const [showAdd, setShowAdd] = useState(false);
  const [filter, setFilter] = useState("all"); // "all" | "mine" (customer only)
  const [form, setForm] = useState({title:"",qty:"",unit:"",notes:"",urgency:"normal"});
  const [toast, setToast] = useState(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const ff=k=>v=>setForm(p=>({...p,[k]:v}));

  // Customer sees all needs (can filter to their own); Farmer/Company sees all
  const filtered = isMyNeeds && filter==="mine"
    ? needs.filter(n=>n.posterId===user.id)
    : needs;

  const post=()=>{
    if (!form.title||!form.qty) return;
    const n={id:uid(),posterId:user.id,posterName:user.name,posterArea:user.area,
      posterPhone:user.phone||"—",...form,date:today(),
      time:new Date().toLocaleTimeString("en-TZ",{hour:"2-digit",minute:"2-digit"}),
      responses:[]};
    const u=[n,...needs]; LS.set("kp_needs",u); setNeeds(u);
    setForm({title:"",qty:"",unit:"",notes:"",urgency:"normal"});
    setShowAdd(false); showToast("✅ Need posted!");
  };

  const respond=(needId)=>{
    const already = needs.find(n=>n.id===needId)?.responses?.find(r=>r.responderId===user.id);
    if (already) return;
    const u=needs.map(n=>n.id===needId?{...n,responses:[...n.responses,{
      responderId:user.id,responder:user.name,role:user.role,area:user.area,
      phone:user.phone||"—",date:today()}]}:n);
    LS.set("kp_needs",u); setNeeds(u); showToast("✅ Response sent! Customer will see your contact.");
  };

  const remove=(needId)=>{
    const u=needs.filter(x=>x.id!==needId); LS.set("kp_needs",u); setNeeds(u);
    showToast("Need removed.");
  };

  const myNeeds = needs.filter(n=>n.posterId===user.id);

  return (
    <div style={{padding:"14px 14px 80px"}}>
      {toast&&<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:T.green,color:"#fff",padding:"9px 22px",borderRadius:6,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 2px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>
            {isMyNeeds?"📢 Product Needs Board":"👁️ Customer Needs"}
          </h2>
          <p style={{fontSize:12,color:T.textL,margin:0}}>
            {isMyNeeds
              ? "Post what you need — farmers & companies will respond"
              : "Customers who need products — tap to say you can supply"}
          </p>
        </div>
        {isMyNeeds&&<Btn onClick={()=>setShowAdd(true)} small color={T.blue}>+ Post Need</Btn>}
      </div>

      {/* Customer filter tabs */}
      {isMyNeeds&&<div style={{display:"flex",gap:8,marginBottom:12}}>
        {[["all",t("allNeeds")],["mine",t("myNeeds")]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)}
            style={{padding:"6px 16px",borderRadius:20,border:"none",background:filter===v?T.blue:"#f0f0f0",color:filter===v?"#fff":T.textM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            {l}{v==="mine"&&myNeeds.length>0?` (${myNeeds.length})`:""}
          </button>
        ))}
      </div>}

      {/* Supplier banner */}
      {!isMyNeeds&&needs.length>0&&<div style={{background:"#ede9fe",borderRadius:14,padding:"9px 14px",marginBottom:12,fontSize:12,color:"#7c3aed",borderLeft:"3px solid #7c3aed"}}>
        📣 <strong>{needs.length}</strong> customer{needs.length>1?"s are":" is"} looking for products — respond if you can supply!
      </div>}

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",background:T.card,borderRadius:8,boxShadow:"none",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:44,marginBottom:10}}>{isMyNeeds?"📢":"🔍"}</div>
          <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 4px"}}>
            {isMyNeeds&&filter==="mine"?"You haven't posted any needs yet":isMyNeeds?"No customer needs yet":"No customer needs yet"}
          </p>
          <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>
            {isMyNeeds?"When you need a product, post it here and farmers will respond":"Check back later"}
          </p>
          {isMyNeeds&&<Btn onClick={()=>setShowAdd(true)} color={T.blue}>+ Post Your First Need</Btn>}
        </div>
      )}

      {filtered.map(n=>{
        const isOwn = n.posterId===user.id;
        const alreadyResponded = n.responses?.find(r=>r.responderId===user.id);
        return (
          <Card key={n.id} style={{borderLeft:`4px solid ${n.urgency==="urgent"?T.red:T.blue}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:"0 0 3px",fontSize:14,fontWeight:800,color:T.text}}>{n.title}</p>
                <p style={{margin:"0 0 2px",fontSize:12,color:T.textM}}>
                  Qty needed: <strong style={{color:T.blue}}>{n.qty} {n.unit}</strong>
                </p>
                <p style={{margin:"0 0 2px",fontSize:11,color:T.textL}}>
                  📍 {n.posterArea} · {n.date} {n.time||""}
                </p>
                <p style={{margin:0,fontSize:11,color:T.sky}}>
                  👤 {n.posterName} · <a href={`tel:${n.posterPhone}`} style={{color:T.sky,fontWeight:700,textDecoration:"none"}}>📞 {n.posterPhone}</a>
                </p>
              </div>
              <span style={{
                background:n.urgency==="urgent"?T.redL:T.blueL,
                color:n.urgency==="urgent"?T.red:T.blue,
                fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10,flexShrink:0,marginLeft:8
              }}>{n.urgency==="urgent"?"🔴 URGENT":"🔵 Normal"}</span>
            </div>

            {n.notes&&<div style={{background:"#f9fafb",borderRadius:10,padding:"8px 11px",marginBottom:8,fontSize:12,color:T.textM,borderLeft:`2px solid ${T.border}`}}>
              💬 {n.notes}
            </div>}

            {/* Responses */}
            {n.responses?.length>0&&<div style={{marginBottom:8}}>
              <p style={{fontSize:11,fontWeight:700,color:T.green,margin:"0 0 5px"}}>
                ✅ {n.responses.length} supplier{n.responses.length>1?"s":""} can supply:
              </p>
              {n.responses.map((r,i)=>(
                <div key={i} style={{background:T.greenXL,borderRadius:10,padding:"7px 10px",marginBottom:4,fontSize:11}}>
                  <span style={{fontWeight:700,color:T.green}}>{r.responder}</span>
                  <span style={{color:T.textL}}> · {ROLES[r.role]?.label||r.role} · {r.area}</span>
                  <a href={`tel:${r.phone}`} style={{display:"block",color:T.sky,fontWeight:600,marginTop:1,textDecoration:"none"}}>📞 {r.phone}</a>
                </div>
              ))}
            </div>}

            {/* Action buttons */}
            <div style={{display:"flex",gap:8}}>
              {!isOwn&&!isMyNeeds&&!alreadyResponded&&(
                <Btn onClick={()=>respond(n.id)} small color={T.green} style={{flex:1}}>
                  📦 I Can Supply This
                </Btn>
              )}
              {!isOwn&&!isMyNeeds&&alreadyResponded&&(
                <div style={{flex:1,background:T.greenXL,borderRadius:10,padding:"7px 12px",fontSize:11,fontWeight:700,color:T.green,textAlign:"center"}}>
                  ✓ You responded
                </div>
              )}
              {isOwn&&(
                <Btn onClick={()=>remove(n.id)} small outline color={T.red} style={{flex:1}}>
                  🗑 Remove
                </Btn>
              )}
            </div>
          </Card>
        );
      })}

      {/* Post Need Modal */}
      {showAdd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowAdd(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:"14px 14px 0 0",width:"100%",maxHeight:"88vh",overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"20px 20px 44px",fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>
          <div style={{width:40,height:4,borderRadius:4,background:T.border,margin:"0 auto 18px"}}/>
          <h3 style={{fontSize:16,fontWeight:700,color:T.text,margin:"0 0 4px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>Post a Product Need</h3>
          <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>Farmers and companies will see this and contact you</p>
          <Input label="What product do you need?" value={form.title} onChange={ff("title")}
            placeholder="e.g. Fresh broiler chickens, Layer eggs, Dairy milk, Goat meat" required/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Quantity" value={form.qty} onChange={ff("qty")} placeholder="e.g. 20" type="number" required/>
            <Input label="Unit" value={form.unit} onChange={ff("unit")} placeholder="chickens, eggs, litres..."/>
          </div>
          <p style={{fontSize:11,fontWeight:700,color:T.textM,textTransform:"none",letterSpacing:0,margin:"0 0 8px"}}>Urgency</p>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {["normal","urgent"].map(u=>(
              <button key={u} onClick={()=>setForm(p=>({...p,urgency:u}))}
                style={{flex:1,background:form.urgency===u?(u==="urgent"?T.red:T.blue):"#f0f0f0",color:form.urgency===u?"#fff":T.textM,border:"none",borderRadius:10,padding:"9px 0",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
                {u==="urgent"?"🔴 Urgent":"🔵 Normal"}
              </button>
            ))}
          </div>
          <Textarea label="Additional details (optional)" value={form.notes} onChange={ff("notes")} rows={2}
            placeholder="e.g. Need delivery to Machame, prefer organic, cash on delivery..."/>
          <Btn onClick={post} full color={T.blue}>Post This Need</Btn>
        </div>
      </div>}
    </div>
  );
}

/* ── INCOMING ORDERS (farmer sees customers) ─────────────────── */
function IncomingOrders({user, orders, setOrders}) {
  const {lang,t}=useLang();
  const mine = orders.filter(o=>o.sellerId===user.id);
  const [assigningDelivery, setAssigningDelivery] = useState(null); // orderId
  const [selectedAgent, setSelectedAgent] = useState(null);

  const update=(id,updates)=>{
    const u=orders.map(o=>o.id===id?{...o,...updates}:o);
    LS.set("kp_orders",u); setOrders(u);
  };

  const agents = getNearestAgents(user.area, user.area);

  return (
    <div style={{padding:"14px 14px 80px"}}>
      <h2 style={{fontSize:16,fontWeight:700,color:T.text,margin:"0 0 4px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{t("customerOrders2")}</h2>
      <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>{t("ordersOnProducts")}</p>
      {mine.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:T.textL,fontSize:14}}>{t("noOrdersYet")}</div>}
      {mine.map(o=>(
        <Card key={o.id} style={{borderLeft:o.status==="pending"||o.status==="confirmed"?`4px solid ${T.amber}`:o.status==="delivered"?`4px solid ${T.green}`:o.status==="cancelled"?`4px solid ${T.red}`:`4px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800,color:T.text}}>{o.icon||"📦"} {o.productName}</p>
              <p style={{margin:"0 0 2px",fontSize:10,color:"#64748b",fontFamily:"monospace"}}>#{o.id} · {o.date} {o.time||""}</p>
              <p style={{margin:"0 0 2px",fontSize:12,color:T.textM,fontWeight:600}}>{o.qty} {o.unitLabel}{(o.qty||1)>1?"s":""}</p>
            </div>
            <div style={{textAlign:"right"}}>
              <StatusPill status={o.status}/>
              <p style={{margin:"5px 0 0",fontSize:14,fontWeight:900,color:T.green}}>TZS {fmt(o.total)}</p>
              {o.paid&&<span style={{fontSize:10,color:T.green,fontWeight:700,display:"block"}}>{t("paidLabel")}</span>}
            </div>
          </div>

          {/* Buyer info */}
          <div style={{background:T.greenXL,borderRadius:12,padding:"9px 12px",marginBottom:8}}>
            <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700,color:T.green}}>{o.buyerName}</p>
            <p style={{margin:"0 0 2px",fontSize:11,color:T.textM}}>{o.buyerArea}</p>
            {o.buyerPhone&&<p style={{margin:0,fontSize:11}}><a href={`tel:${o.buyerPhone}`} style={{color:T.sky,fontWeight:700,textDecoration:"none"}}>📞 {o.buyerPhone} — {t("tapToCall")}</a></p>}
          </div>

          {/* Delivery info or assign delivery */}
          {o.delivery&&o.deliveryAgent&&(
            <div style={{background:T.amberL,borderRadius:10,padding:"8px 12px",marginBottom:8,fontSize:11,color:"#92400e"}}>
              <p style={{margin:"0 0 1px",fontWeight:700}}>{t("deliveryAssigned")}</p>
              <p style={{margin:"0 0 1px"}}>{o.deliveryAgent.vehicle==="Motorcycle"?"🏍️":"🚛"} {o.deliveryAgent.name} · {o.deliveryAgent.vehicle}</p>
              <p style={{margin:0}}>{o.deliveryAgent.area} · <a href={`tel:${o.deliveryAgent.phone}`} style={{color:T.soil,fontWeight:700,textDecoration:"none"}}>📞 {o.deliveryAgent.phone}</a></p>
            </div>
          )}
          {!o.delivery&&(o.status==="confirmed"||o.status==="processing")&&(
            <div style={{background:"#f0f0f0",borderRadius:10,padding:"8px 12px",marginBottom:8}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.textM}}>{t("noDeliverySelected")}</p>
              {assigningDelivery===o.id?(
                <>
                  <p style={{margin:"0 0 6px",fontSize:11,color:T.textM}}>{t("selectAgentDeliver")}</p>
                  {agents.map(a=>(
                    <div key={a.id} onClick={()=>setSelectedAgent(a)}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:10,border:`2px solid ${selectedAgent?.id===a.id?T.green:T.border}`,background:selectedAgent?.id===a.id?T.greenXL:"#fff",marginBottom:6,cursor:"pointer"}}>
                      <div>
                        <p style={{margin:"0 0 1px",fontSize:12,fontWeight:700,color:T.text}}>{a.vehicle==="Motorcycle"?"🏍️":"🚛"} {a.name}</p>
                        <p style={{margin:0,fontSize:10,color:"#64748b"}}>{a.area} · {a.vehicle}</p>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <p style={{margin:"0 0 1px",fontSize:11,fontWeight:800,color:T.amber}}>TZS {fmt(a.estimatedFee)}</p>
                        {selectedAgent?.id===a.id&&<span style={{fontSize:9,color:T.green,fontWeight:700}}>{t("chosenLabel")}</span>}
                      </div>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:6}}>
                    <Btn onClick={()=>{setAssigningDelivery(null);setSelectedAgent(null);}} small outline color={T.textM}>{t("cancelBtn")}</Btn>
                    <Btn onClick={()=>{if(selectedAgent){update(o.id,{delivery:true,deliveryAgent:selectedAgent});setAssigningDelivery(null);setSelectedAgent(null);}}} small color={T.green} style={{flex:1}} disabled={!selectedAgent}>{t("assignAgent")}</Btn>
                  </div>
                </>
              ):(
                <Btn onClick={()=>{setAssigningDelivery(o.id);setSelectedAgent(null);}} small full color={T.sky}>
                  + Assign Delivery Agent
                </Btn>
              )}
            </div>
          )}

          {/* Actions */}
          {(o.status==="pending"||o.status==="confirmed")&&<div style={{display:"flex",gap:8,marginTop:4}}>
            <Btn onClick={()=>update(o.id,{status:"processing"})} small color={T.green} style={{flex:1}}>{t("confirmBtn")}</Btn>
            <Btn onClick={()=>update(o.id,{status:"cancelled"})} small outline color={T.red} style={{flex:1}}>{t("cancelBtn")}</Btn>
          </div>}
          {o.status==="processing"&&<Btn onClick={()=>update(o.id,{status:"in_transit"})} small full color={T.amber} style={{marginTop:4}}>{t("markDispatched")}</Btn>}
          {o.status==="in_transit"&&<Btn onClick={()=>update(o.id,{status:"delivered"})} small full color={T.green} style={{marginTop:4}}>{t("markDelivered")}</Btn>}
        </Card>
      ))}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════
   ENHANCED FARMER DASHBOARD (replaces old FarmerDashboard)
══════════════════════════════════════════════════════════════ */
function FarmerDashboard({user, onLogout}) {
  const {lang,t}=useLang();
  const [tab, setTab] = useState("home");
  const [flocks, setFlocks] = useState(()=>LS.get("kp_flocks_"+user.id,[]));
  const [products, setProducts] = useState(()=>LS.get("kp_market",SEED_PRODUCTS));
  const [orders, setOrders] = useState(()=>LS.get("kp_orders",[]));
  const [showRegFlock, setShowRegFlock] = useState(false);
  const [showListProduct, setShowListProduct] = useState(false);
  const [activeFlock, setActiveFlock] = useState(null);
  const gps = useGPS();

  useEffect(()=>LS.set("kp_flocks_"+user.id,flocks),[flocks]);
  useEffect(()=>LS.set("kp_market",products),[products]);
  useEffect(()=>LS.set("kp_orders",orders),[orders]);
  useEffect(()=>gps.detect(),[]);

  // Auto-generate AI schedules for new flocks
  useEffect(()=>{
    flocks.forEach(f=>{
      if (!f.schedule && !f._gen) {
        setFlocks(fs=>fs.map(x=>x.id===f.id?{...x,_gen:true}:x));
        aiGrowthSchedule(f).then(text=>setFlocks(fs=>fs.map(x=>x.id===f.id?{...x,schedule:text,_gen:false}:x)))
          .catch(()=>setFlocks(fs=>fs.map(x=>x.id===f.id?{...x,_gen:false}:x)));
      }
    });
  },[flocks.length]);

  const totalSick = flocks.reduce((s,f)=>s+f.sick,0);
  const totalAnimals = flocks.reduce((s,f)=>s+f.total,0);
  const pendingOrders = orders.filter(o=>o.sellerId===user.id&&o.status==="pending");
  const myProducts = products.filter(p=>p.sellerId===user.id);

  const TABS=[
    {id:"home",    label:t("tabHome"),     icon:"🏠"},
    {id:"flocks",  label:t("tabFlock"),    icon:"🐾"},
    {id:"products",label:t("tabProducts"),  icon:"📦"},
    {id:"orders",  label:t("tabOrders"),    icon:"📬"},
    {id:"chat",    label:t("tabChat"),      icon:"💬"},
    {id:"buy",     label:t("tabBuy"),       icon:"🛍️"},
  ];

  // If flock dashboard is open, show it full-screen
  if (activeFlock) {
    const latest = flocks.find(f=>f.id===activeFlock.id);
    return (
      <div style={{height:"100svh",minHeight:"-webkit-fill-available",display:"flex",flexDirection:"column",background:T.bg,maxWidth:480,margin:"0 auto",fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>
        <link href={FONT_LINK} rel="stylesheet"/>
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          <FlockDashboard
            flock={latest||activeFlock}
            allFlocks={flocks}
            setFlocks={setFlocks}
            onBack={()=>setActiveFlock(null)}/>
        </div>
      </div>
    );
  }

  return (
    <Shell user={user} onLogout={onLogout} tab={tab} setTab={setTab} tabs={TABS} badge={pendingOrders.length}>

      {tab==="home"&&<div style={{padding:"16px 14px 20px"}}>
        <div style={{background:"#0f172a",borderRadius:10,padding:"18px 18px 20px",marginBottom:14,position:"relative",overflow:"hidden"}}>
          
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:11,margin:"0 0 3px",letterSpacing:1,textTransform:"uppercase"}}>{t("welcomeMsg")}</p>
          <h2 style={{color:"#fff",fontSize:22,fontWeight:900,margin:"0 0 14px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{user.name.split(" ")[0]} 🌾</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>
            {[[t("flocks"),flocks.length,"🐾"],[t("animals"),totalAnimals,"📊"],[t("sickLabel"),totalSick,"🔴"],[t("tabOrders"),pendingOrders.length,"📬"]].map(([l,v,i])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.07)",borderRadius:6,padding:"8px 4px",textAlign:"center",border:"1px solid rgba(255,255,255,0.08)"}}>
                <div style={{fontSize:16}}>{i}</div>
                <div style={{fontSize:19,fontWeight:900,color:"#fff",lineHeight:1.1}}>{v}</div>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.7)",fontWeight:600,marginTop:2,textTransform:"uppercase"}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        {totalSick>0&&<div style={{background:T.redL,borderRadius:14,padding:"11px 14px",marginBottom:10,borderLeft:`4px solid ${T.red}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:22}}>🚨</span>
          <div>
            <p style={{margin:"0 0 3px",fontSize:13,fontWeight:800,color:T.red}}>{totalSick} {t("animalsNeedAttn")}</p>
            <Btn onClick={()=>setTab("flocks")} small color={T.red}>{t("checkFlocks")}</Btn>
          </div>
        </div>}
        {pendingOrders.length>0&&<div style={{background:T.amberL,borderRadius:14,padding:"11px 14px",marginBottom:10,borderLeft:`4px solid ${T.amber}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:22}}>🔔</span>
          <div>
            <p style={{margin:"0 0 3px",fontSize:13,fontWeight:800,color:T.amber}}>{pendingOrders.length} {pendingOrders.length>1?t("newOrdersPlural"):t("newOrders")}</p>
            <Btn onClick={()=>setTab("orders")} small color={T.amber}>{t("viewOrders")}</Btn>
          </div>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[[t("registerFlock"),"🐾",()=>setShowRegFlock(true),T.greenXL,T.green],[t("aiSchedules"),"📅",()=>setTab("flocks"),T.blueL,T.blue],[t("listProducts"),"📦",()=>setTab("products"),T.amberL,T.amber],[t("customerOrders"),"📬",()=>setTab("orders"),T.redL,T.red]].map(([l,i,a,bg,c])=>(
            <button key={l} onClick={a} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <div style={{fontSize:26,marginBottom:5}}>{i}</div><div style={{fontSize:12,fontWeight:600,color:T.text}}>{l}</div>
            </button>
          ))}
        </div>
        {flocks.length>0&&<>
          <p style={{fontSize:11,fontWeight:700,color:T.textM,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.8}}>{t("myFlocks")}</p>
          {flocks.slice(0,3).map(f=>{
            const pt=POULTRY_TYPES.find(p=>p.id===f.poultryType); const at=ANIMALS.find(a=>a.id===f.animalType);
            const day=daysSince(f.intakeDate)+1;
            return (
              <div key={f.id} onClick={()=>setActiveFlock(f)} style={{background:T.card,borderRadius:14,padding:"11px 14px",marginBottom:8,boxShadow:"0 1px 8px rgba(0,0,0,0.06)",display:"flex",gap:10,alignItems:"center",cursor:"pointer",border:`1px solid ${T.border}`}}>
                <span style={{fontSize:26,flexShrink:0}}>{pt?.icon||at?.icon||"🐾"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:"0 0 1px",fontSize:13,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.breed}</p>
                  <p style={{margin:0,fontSize:10,color:"#64748b"}}>{f.total} {t("animalsUnit")} · {t("dayLabel")} {day}</p>
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                  {f.sick>0&&<span style={{background:T.redL,color:T.red,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{f.sick} {t("sickLabel")}</span>}
                  {f.schedule&&<span style={{background:T.greenXL,color:T.green,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>AI ✓</span>}
                  <span style={{color:T.textL,fontSize:18}}>›</span>
                </div>
              </div>
            );
          })}
          {flocks.length>3&&<Btn onClick={()=>setTab("flocks")} full outline color={T.green} small>{t("seeAll")} {flocks.length} {t("flocks")} →</Btn>}
        </>}
        {showRegFlock&&<RegisterFlockModal onClose={()=>setShowRegFlock(false)} onAdd={f=>{setFlocks(fs=>[...fs,f]);setShowRegFlock(false);setActiveFlock(f);}}/>}
      </div>}

      {/* FLOCKS */}
      {tab==="flocks"&&<div style={{padding:"14px 14px 80px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:0,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{t("myFlocksTitle")}</h2>
          <Btn onClick={()=>setShowRegFlock(true)} small color={T.green}>{t("registerBtn")}</Btn>
        </div>
        {flocks.length===0&&<div style={{textAlign:"center",padding:"40px 20px",background:T.card,borderRadius:8,boxShadow:"none",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:52,marginBottom:10}}>🐾</div>
          <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 4px"}}>{t("noFlocksYet")}</p>
          <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>{t("noFlocksDesc")}</p>
          <Btn onClick={()=>setShowRegFlock(true)} color={T.green}>{t("registerFirstFlock")}</Btn>
        </div>}
        {flocks.map(f=>{
          const pt=POULTRY_TYPES.find(p=>p.id===f.poultryType); const at=ANIMALS.find(a=>a.id===f.animalType);
          const dayNum=daysSince(f.intakeDate)+1; const pct=f.total>0?Math.round((f.healthy/f.total)*100):100;
          const missed=Object.values(f.dayLog||{}).filter(d=>d.done===false).length;
          return (
            <Card key={f.id}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
                <div style={{width:40,height:40,borderRadius:6,background:T.greenXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{pt?.icon||at?.icon||"🐾"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800,color:T.text,fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{f.breed}</p>
                  <p style={{margin:"0 0 4px",fontSize:11,color:T.textL,textTransform:"capitalize"}}>{lang==="sw"?(ANIMALS.find(a=>a.id===f.animalType)?.labelSw||f.animalType):f.animalType} · {f.total} {t("animalsUnit")} · {f.intakeDate}</p>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <span style={{background:T.skyL,color:T.sky,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{t("dayLabel")} {dayNum}</span>
                    {missed>0&&<span style={{background:T.redL,color:T.red,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{missed} {t("missedDays")}</span>}
                    {f.schedule&&<span style={{background:T.greenXL,color:T.green,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{t("aiActive")}</span>}
                    {f._gen&&<span style={{background:T.amberL,color:T.amber,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10}}>⏳ {t("generating")}</span>}
                  </div>
                </div>
              </div>
              <div style={{background:"#e5e7eb",borderRadius:6,height:7,overflow:"hidden",marginBottom:5}}>
                <div style={{background:pct>75?T.green:pct>50?T.amber:T.red,width:`${pct}%`,height:"100%",borderRadius:6}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:10}}>
                <span>🟢 {f.healthy} {t("healthyLabel")}</span><span>🔴 {f.sick} {t("sickLabel")}</span><span>{pct}% {t("healthPct")}</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>setActiveFlock(f)} small color={T.green} style={{flex:1}}>{t("openDashboard")}</Btn>
                <Btn onClick={()=>setFlocks(fs=>fs.filter(x=>x.id!==f.id))} small outline color={T.red}>🗑</Btn>
              </div>
            </Card>
          );
        })}
        {showRegFlock&&<RegisterFlockModal onClose={()=>setShowRegFlock(false)} onAdd={f=>{setFlocks(fs=>[...fs,f]);setShowRegFlock(false);setActiveFlock(f);}}/>}
      </div>}

      {/* MY SHOP — list products */}
      {tab==="products"&&<div style={{padding:"14px 14px 80px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 2px",fontFamily:"'IBM Plex Serif',Georgia,serif"}}>{t("myProductsTitle")}</h2>
            <p style={{fontSize:12,color:T.textL,margin:0}}>{myProducts.length} {t("listedCount")}</p>
          </div>
          <Btn onClick={()=>setShowListProduct(true)} small color={T.green}>{t("listProductBtn")}</Btn>
        </div>
        {myProducts.length===0&&<div style={{textAlign:"center",padding:"40px 20px",background:T.card,borderRadius:8,boxShadow:"none",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:44,marginBottom:10}}>📦</div>
          <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 4px"}}>{t("noProductsYetMsg")}</p>
          <p style={{fontSize:12,color:T.textL,margin:"0 0 14px"}}>{t("noProductsDesc")}</p>
          <Btn onClick={()=>setShowListProduct(true)} color={T.green}>{t("listFirstProduct")}</Btn>
        </div>}
        {myProducts.map(p=>(
          <Card key={p.id}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{width:52,height:52,borderRadius:14,background:p.eggType==="natural"?"#fff7ed":p.cat==="dairy"?"#e0f2f1":T.greenXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0}}>{p.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:800,color:T.text}}>{p.name}</p>
                {p.extraLabel&&<p style={{margin:"0 0 2px",fontSize:11,color:T.textM}}>📌 {p.extraLabel}</p>}
                {p.eggType&&<span style={{background:p.eggType==="natural"?"#fff7ed":"#fef3c7",color:p.eggType==="natural"?"#ea580c":"#d97706",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,display:"inline-block",marginBottom:3}}>{p.eggType==="natural"?(lang==="sw"?"Mayai Asili":"Natural Eggs"):(lang==="sw"?"Mayai ya Layers":"Layer Eggs")}</span>}
                <p style={{margin:"2px 0 0",fontSize:13,fontWeight:800,color:T.green}}>TZS {fmt(p.price)} <span style={{fontSize:10,color:"#64748b",fontWeight:400}}>{t("perUnit")} {p.unitLabel}</span></p>
                <p style={{margin:"1px 0 0",fontSize:10,color:"#64748b"}}>{t("stockLabel")}: {p.stock} · {p.date}</p>
              </div>
              <Btn onClick={()=>setProducts(ps=>ps.filter(x=>x.id!==p.id))} small outline color={T.red}>🗑</Btn>
            </div>
          </Card>
        ))}
        {showListProduct&&<ListProductModal user={user} onClose={()=>setShowListProduct(false)} onAdd={p=>{const u=[p,...products];setProducts(u);LS.set("kp_market",u);setShowListProduct(false);}}/>}
      </div>}

      {/* INCOMING ORDERS */}
      {tab==="orders"&&<IncomingOrders user={user} orders={orders} setOrders={setOrders}/>}

      {/* CHAT */}
      {tab==="chat"&&<ChatList user={user}/>}

      {/* BUY SUPPLIES */}
      {tab==="buy"&&<CompanyOrderFlow user={user} orders={orders} setOrders={setOrders} gps={gps}/>}

    </Shell>
  );
}
